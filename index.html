  <meta charset="UTF-8" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #080810; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #252535; border-radius: 2px; }
    select { appearance: none; -webkit-appearance: none; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
    @keyframes newBooking { 0%{transform:scale(1.02);box-shadow:0 0 0 3px #22c55e40} 100%{transform:scale(1);box-shadow:none} }
  </style>
</head>
<body>
  <div id="root"><div id="loading" style="color:#505070;padding:40px;font-family:monospace;background:#06060f;min-height:100vh;display:flex;align-items:center;justify-content:center;font-size:14px;">Loading Bookio...</div></div>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.getElementById("root").innerHTML = '<div style="color:#ff4444;padding:40px;font-family:monospace;background:#0a0010;min-height:100vh;white-space:pre-wrap;"><h2 style=\"margin-bottom:16px\">Error on line ' + line + ':</h2>' + msg + '\n\n' + (err && err.stack || '') + '</div>';
    };
  </script>

    const { useState, useRef, useEffect } = React;

    const URGENCY = { EMERGENCY: "emergency", HIGH: "high", NORMAL: "normal" };
    const STAGE = { PROBLEM: "problem", ZIP_CHECK: "zip_check", INFO_FORM: "info_form", SLOTS: "slots", CONFIRMED: "confirmed" };

    const TEMPLATES = {

    const DENVER_ZIPS = ["80201","80202","80203","80204","80205","80206","80207","80208","80209","80210","80211","80212","80214","80215","80216","80218","80219","80220","80221","80222","80223","80224","80226","80227","80228","80229","80230","80231","80232","80233","80234","80235","80236","80237","80238","80239","80241","80246","80247","80249","80260","80290","80293","80294","80295","80299","80110","80111","80112","80120","80121","80122","80123","80124","80125","80126","80127","80128","80129","80130","80401","80403","80465","80002","80003","80004","80005","80007","80010","80011","80012","80013","80014","80015","80016","80017","80018","80019","80021","80022","80023","80024","80025","80026","80027"];

    const HOURS_LIST = [{label:"8:00 AM",h:8},{label:"9:00 AM",h:9},{label:"10:00 AM",h:10},{label:"11:00 AM",h:11},{label:"12:00 PM",h:12},{label:"1:00 PM",h:13},{label:"2:00 PM",h:14},{label:"3:00 PM",h:15},{label:"4:00 PM",h:16},{label:"5:00 PM",h:17},{label:"6:00 PM",h:18}];

    // ── TRANSLATIONS ──
    const T = {

        addZip:"Add ZIP...", denverCore:"Denver Core", southSuburbs:"South Suburbs", clearAll:"Clear All",

        emergBadge:"🚨 紧急", urgentBadge:"⚡ 加急", stdBadge:"📅 普通",
        navCustomer:"客户", navDashboard:"看板", navSettings:"设置",
      },
    };

    const defaultSettings = (type, customTemplate) => {
      const tmpl = customTemplate || TEMPLATES[type];
      return ({
      businessType: type,
      businessName: tmpl.name,
      phone: tmpl.phone || "",
      city: "Denver", state: "CO",
      serviceZips: [...DENVER_ZIPS],
      services: [...(tmpl.services||[])],
      customPrices: {...(tmpl.prices||{})},
      customEmoji: tmpl.emoji,
      customLabel: tmpl.label,
      customColor: tmpl.color,
      hours: {
        Mon:{open:true,start:"08:00",end:"17:00"}, Tue:{open:true,start:"08:00",end:"17:00"},
        Wed:{open:true,start:"08:00",end:"17:00"}, Thu:{open:true,start:"08:00",end:"17:00"},
        Fri:{open:true,start:"08:00",end:"17:00"}, Sat:{open:true,start:"09:00",end:"14:00"},
        Sun:{open:false,start:"09:00",end:"13:00"},
      },
    });};

    function makeSlots(settings) {
      const slots = [], now = new Date();
      const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      for (let d = 0; d < 7; d++) {
        const day = new Date(now); day.setDate(now.getDate() + d);
        const dk = dayNames[day.getDay()], dh = settings.hours[dk];
        if (!dh || !dh.open) continue;
        const sh = parseInt(dh.start), eh = parseInt(dh.end);
        const dl = d===0?"Today":d===1?"Tomorrow":`${dk} ${months[day.getMonth()]} ${day.getDate()}`;
        HOURS_LIST.forEach(({label,h}) => {
          if (h < sh || h >= eh || (d===0 && h <= now.getHours())) return;
          slots.push({id:`s-${d}-${h}`, day:dl, time:label, booked:Math.random()<0.3});
        });
      }
      return slots;
    }

    async function askAI(messages, system) {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {"Content-Type":"application/json","x-api-key":ANTHROPIC_API_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body: JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:600, system, messages}),
      });
      const d = await r.json();
      if (d.error) throw new Error(d.error.message);
      return d.content?.map(c=>c.text||"").join("") || "";
    }

    function Ico({name, size=18}) {
      const p = {
        send:<><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>,
        cal:<><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
        ok:<polyline points="20 6 9 17 4 12"/>,
        clk:<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
        grid:<><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></>,
        cog:<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
        chat:<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>,
        shld:<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>,
        x:<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
        plus:<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
      };
      return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{p[name]}</svg>;
    }

    function Badge({level, lang="en"}) {
      const t = T[lang]||T.en;
      const c = {
        emergency:{t:t.emergBadge,bg:"#3d0000",col:"#ff4444",br:"#ff444466"},
        high:{t:t.urgentBadge,bg:"#2d1a00",col:"#f97316",br:"#f9731666"},
        normal:{t:t.stdBadge,bg:"#001a2d",col:"#60a5fa",br:"#60a5fa66"}
      };
      const x = c[level]||c.normal;
      return <span style={{padding:"3px 10px",borderRadius:20,fontSize:10,fontWeight:700,letterSpacing:"0.06em",background:x.bg,color:x.col,border:`1px solid ${x.br}`}}>{x.t}</span>;
    }

    // ── PRICE RANGE HELPERS ──
    // Parses "$100-$500" → {min:"100", max:"500"}
    const parsePriceRange = (str) => {
      if (!str) return {min:"", max:""};
      const m = str.match(/\$?([\d,]+)\s*[-–]\s*\$?([\d,]+)/);
      if (m) return {min:m[1].replace(/,/g,""), max:m[2].replace(/,/g,"")};
      const single = str.match(/\$?([\d,]+)/);
      if (single) return {min:single[1].replace(/,/g,""), max:""};
      return {min:"", max:""};
    };
    const buildPriceRange = (min, max) => {
      const a = min.replace(/\D/g,""), b = max.replace(/\D/g,"");
      if (!a && !b) return "";
      if (a && !b) return `$${a}`;
      return `$${a}-$${b}`;
    };
    const fmtDigits = (v) => v.replace(/\D/g,"").slice(0,7);

    // Price range editor for existing services
    function PriceRange({svc, price, ac, lang, onChange}) {
      const {min:initMin, max:initMax} = parsePriceRange(price);
      const [mn, setMn] = useState(initMin);
      const [mx, setMx] = useState(initMax);
      const update = (newMn, newMx) => {
        setMn(newMn); setMx(newMx);
        onChange(buildPriceRange(newMn, newMx));
      };
      const inpStyle = {padding:"5px 9px",background:"#0d0d18",border:`1px solid ${ac}40`,borderRadius:8,color:ac,fontSize:12,outline:"none",fontFamily:"'DM Sans',sans-serif",width:"100%"};
      return (
        <div style={{display:"flex",alignItems:"center",gap:6,marginTop:2}}>
          <span style={{fontSize:10,color:"#505070",fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap"}}>{lang==="zh"?"价格:":"Price:"}</span>
          <div style={{display:"flex",alignItems:"center",gap:4,flex:1}}>
            <span style={{fontSize:11,color:ac,fontFamily:"'DM Sans',sans-serif"}}>$</span>
            <input value={mn} onChange={e=>update(fmtDigits(e.target.value),mx)} placeholder="min" style={inpStyle}/>
            <span style={{fontSize:11,color:"#505070"}}>—</span>
            <span style={{fontSize:11,color:ac,fontFamily:"'DM Sans',sans-serif"}}>$</span>
            <input value={mx} onChange={e=>update(mn,fmtDigits(e.target.value))} placeholder="max" style={inpStyle}/>
          </div>
          {mn&&<span style={{fontSize:11,color:ac,fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap",flexShrink:0}}>{buildPriceRange(mn,mx)}</span>}
        </div>
      );
    }

    // Price range editor for new service form (controlled)
    function NewPriceRange({value, onChange, ac, lang}) {
      const {min:initMin, max:initMax} = parsePriceRange(value);
      const [mn, setMn] = useState(initMin);
      const [mx, setMx] = useState(initMax);
      useEffect(()=>{
        if(!value){setMn("");setMx("");}
      },[value]);
      const update = (newMn, newMx) => {
        setMn(newMn); setMx(newMx);
        onChange(buildPriceRange(newMn, newMx));
      };
      const inpStyle = {padding:"7px 9px",background:"#0f0f1e",border:"1px solid #252540",borderRadius:8,color:"#e0e0f8",fontSize:12,outline:"none",fontFamily:"'DM Sans',sans-serif",width:"100%"};
      return (
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:11,color:"#505070",fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap"}}>{lang==="zh"?"报价:":"Price:"}</span>
          <span style={{fontSize:12,color:"#606080"}}>$</span>
          <input value={mn} onChange={e=>update(fmtDigits(e.target.value),mx)} placeholder={lang==="zh"?"最低":"min"} style={inpStyle}/>
          <span style={{fontSize:11,color:"#505070"}}>—</span>
          <span style={{fontSize:12,color:"#606080"}}>$</span>
          <input value={mx} onChange={e=>update(mn,fmtDigits(e.target.value))} placeholder={lang==="zh"?"最高":"max"} style={inpStyle}/>
          {mn&&<span style={{fontSize:11,color:"#606080",whiteSpace:"nowrap",flexShrink:0,fontFamily:"'DM Sans',sans-serif"}}>{buildPriceRange(mn,mx)}</span>}
        </div>
      );
    }

    // ── SERVICE TAB ──
    function SvcTab({s, setS, ac, lang, t}) {
      const [newSvcName, setNewSvcName] = useState("");
      const [newSvcPrice, setNewSvcPrice] = useState("");
      const inp = {padding:"7px 10px",background:"#0f0f1e",border:"1px solid #252540",borderRadius:8,color:"#e0e0f8",fontSize:12,outline:"none",fontFamily:"'DM Sans',sans-serif"};

      // All services = preset services from template + any custom-added ones
      // We track "allServices" as s.customServices (user-added) merged with template defaults
      const allSvcs = s.services; // services is now the master list

      const toggleSvc = (svc) => {
        // For built-in services: toggle active state via a separate activeServices list
        setS(p => {
          const active = p.activeSvcList || [...p.services];
          const next = active.includes(svc) ? active.filter(x=>x!==svc) : [...active, svc];
          return {...p, activeSvcList: next};
        });
      };

      const isActive = (svc) => {
        if (!s.activeSvcList) return true; // default all on
        return s.activeSvcList.includes(svc);
      };

      const addSvc = () => {
        const name = newSvcName.trim();
        if (!name) return;
        setS(p => ({
          ...p,
          services: [...p.services, name],
          activeSvcList: [...(p.activeSvcList || p.services), name],
          customPrices: {...p.customPrices, [name]: newSvcPrice.trim()},
        }));
        setNewSvcName(""); setNewSvcPrice("");
      };

      const deleteSvc = (svc) => {
        setS(p => ({
          ...p,
          services: p.services.filter(x=>x!==svc),
          activeSvcList: (p.activeSvcList||p.services).filter(x=>x!==svc),
          customPrices: Object.fromEntries(Object.entries(p.customPrices||{}).filter(([k])=>k!==svc)),
        }));
      };

      const activeCount = allSvcs.filter(sv => isActive(sv)).length;

      return (
        <div>
          <div style={{fontSize:10,fontWeight:700,color:"#404060",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:12,fontFamily:"'DM Sans',sans-serif"}}>{t.activeServices}</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {allSvcs.map(svc=>{
              const on = isActive(svc);
              const price = s.customPrices?.[svc] || "";
              return (
                <div key={svc} style={{background:on?"#13131f":"#0d0d18",border:`1.5px solid ${on?ac+"60":"#1a1a28"}`,borderRadius:12,padding:"11px 13px",transition:"all 0.2s"}}>
                  <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:on?8:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:9,flex:1,cursor:"pointer"}} onClick={()=>toggleSvc(svc)}>
                      <div style={{width:20,height:20,borderRadius:"50%",border:`2px solid ${on?ac:"#252535"}`,background:on?ac:"transparent",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",flexShrink:0,transition:"all 0.2s"}}>
                        {on&&<Ico name="ok" size={11}/>}
                      </div>
                      <div style={{fontSize:13,fontWeight:600,color:on?"#d0d0f0":"#404060",fontFamily:"'DM Sans',sans-serif"}}>{svc}</div>
                    </div>
                    <button onClick={()=>deleteSvc(svc)} style={{background:"none",border:"none",color:"#303050",cursor:"pointer",padding:4,display:"flex",borderRadius:6,transition:"color 0.2s"}}
                      onMouseEnter={e=>e.currentTarget.style.color="#ff4444"}
                      onMouseLeave={e=>e.currentTarget.style.color="#303050"}>
                      <Ico name="x" size={13}/>
                    </button>
                  </div>
                  {on && (
                    <PriceRange svc={svc} price={price} ac={ac} lang={lang}
                      onChange={val=>setS(p=>({...p,customPrices:{...p.customPrices,[svc]:val}}))}/>
                  )}
                </div>
              );
            })}
          </div>

          {/* Add new service */}
          <div style={{marginTop:14,padding:"13px",background:"#0c0c18",border:`1px solid ${ac}25`,borderRadius:12}}>
            <div style={{fontSize:10,fontWeight:700,color:ac,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10,fontFamily:"'DM Sans',sans-serif"}}>
              + {lang==="zh"?"添加新服务":"Add new service"}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:8}}>

    // ── AREA TAB ──

        setAutoStatus("loading");
        try {
          // Use zippopotam.us free API - search by city+state
          const res = await fetch(`https://api.zippopotam.us/us/${encodeURIComponent(state)}/${encodeURIComponent(city)}`);
          if (!res.ok) throw new Error("not found");
          const data = await res.json();
          const newZips = data.places.map(p => p["post code"]);
          const merged = [...new Set([...s.serviceZips, ...newZips])];
          setS(p => ({...p, serviceZips: merged}));
          setAutoCount(newZips.length);
          setAutoStatus("done");
          setTimeout(() => setAutoStatus(null), 3000);

    // ── CHAT ──
    // Stage extension: add URGENCY_SELECT before PROBLEM, URGENCY_CONFIRM after PROBLEM
    const XSTAGE = {...STAGE, URGENCY_SELECT:"urgency_select", URGENCY_CONFIRM:"urgency_confirm"};

    function Chat({settings, onBooked}) {
      // Support both built-in and custom business types
      const tmpl = TEMPLATES[settings.businessType] || {
        emoji: settings.customEmoji || "🏢",
        label: settings.customLabel || settings.businessType,
        color: settings.customColor || "#0ea5e9",
        emergencyWords: settings.customEmergencyWords || [],
        greeting: settings.customGreeting || "How can I help you today?",
      };
      const slots = makeSlots(settings);
      const ac = tmpl.color;
      const [stage, setStage] = useState(XSTAGE.URGENCY_SELECT);
      const [msgs, setMsgs] = useState([]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const [urgency, setUrgency] = useState(null);
      const [detectedUrgency, setDetectedUrgency] = useState(null);
      const [service, setService] = useState("");
      const [zip, setZip] = useState(null);
      const [info, setInfo] = useState(null);
      const [booking, setBooking] = useState(null);
      const bot = useRef(null);
      useEffect(()=>{ if(bot.current) bot.current.scrollIntoView({behavior:"smooth"}); },[msgs,stage]);

      const handleUrgencySelect = (level) => {
        setUrgency(level);
        const greetMap = {
          emergency: `🚨 Got it — you've marked this as an emergency. I'll make sure we get to you fast.

${tmpl.greeting} What's happening right now?`,
          high: `⚡ Understood — urgent request. We'll do our best to get someone out today.

${tmpl.greeting} What's going on?`,
          normal: `👋 Hi! I'm the AI assistant for ${settings.businessName}.

${tmpl.greeting} What can I help you with today?`,
        };
        setMsgs([{role:"assistant", content: greetMap[level]}]);
        setStage(XSTAGE.PROBLEM);
      };

      const handleUrgencyConfirm = (confirmedLevel) => {
        setUrgency(confirmedLevel);
        setMsgs(p=>[...p, {role:"assistant", content:`Got it — marked as ${confirmedLevel==="emergency"?"🚨 Emergency":confirmedLevel==="high"?"⚡ Urgent":"📅 Regular"}. What's your ZIP code so I can confirm we cover your area?`}]);
        setStage(STAGE.ZIP_CHECK);
      };

      const activeSvcs = (settings.activeSvcList || settings.services).filter(sv => settings.services.includes(sv));
      const svcWithPrices = activeSvcs.map(sv => {
        const price = settings.customPrices?.[sv];
        return price ? `${sv} (${price})` : sv;
      }).join(", ");
      const emergWords = tmpl.emergencyWords && tmpl.emergencyWords.length ? tmpl.emergencyWords.join(", ") : "urgent, emergency, asap, broken, no heat, no water, flooding, leak";

      const sys = `You are a booking assistant for ${settings.businessName}, a ${tmpl.label} business in ${settings.city}, ${settings.state}.

ACTIVE SERVICES (with price ranges): ${svcWithPrices || "General services"}

STEP 1 — CHECK IF IN SCOPE:
First, determine if the customer's request matches any of the active services above.
- If OUT OF SCOPE: Politely say you don't offer that service, list what you DO offer, and ask if any of those would help. Do NOT tag URGENCY or SERVICE. Do NOT say ASK_ZIP_CONFIRM.
- If IN SCOPE: continue to Step 2.

STEP 2 — URGENCY:
Assess urgency based on the problem described.
Emergency keywords (if any): ${emergWords}
Tag exactly one: URGENCY:EMERGENCY / URGENCY:HIGH / URGENCY:NORMAL

STEP 3 — TAG SERVICE:
Tag the best matching service: SERVICE:[exact service name from list]

STEP 4 — END:
After understanding the issue, end your message with ASK_ZIP_CONFIRM to trigger the next step.

Rules:
- Keep replies short (2-3 sentences max) and warm
- Never make up services not on the list
- If unsure which service, ask one clarifying question`;

      const send = async (text) => {
        const t = text||input.trim();
        if (!t||loading||(stage!==XSTAGE.PROBLEM&&stage!==XSTAGE.URGENCY_CONFIRM)) return;
        setInput("");
        const nm = [...msgs,{role:"user",content:t}];
        setMsgs(nm);
        setLoading(true);
        try {
          const r = await askAI(nm.map(m=>({role:m.role,content:m.content})), sys);
          let c = r;
          // Parse detected urgency from AI (may differ from user selection)
          let det = urgency;
          if(r.includes("URGENCY:EMERGENCY")){det="emergency";c=c.replace(/URGENCY:EMERGENCY/g,"");}
          else if(r.includes("URGENCY:HIGH")){det="high";c=c.replace(/URGENCY:HIGH/g,"");}
          else if(r.includes("URGENCY:NORMAL")){det="normal";c=c.replace(/URGENCY:NORMAL/g,"");}
          const sv=r.match(/SERVICE:([^\n|]+)/);
          if(sv){setService(sv[1].trim());c=c.replace(/SERVICE:[^\n|]+/g,"");}
          // Trigger urgency confirmation card
          if(r.includes("ASK_ZIP_CONFIRM")){
            c=c.replace(/ASK_ZIP_CONFIRM/g,"").trim();
            setDetectedUrgency(det);
            if(c) setMsgs(p=>[...p,{role:"assistant",content:c}]);
            setStage(XSTAGE.URGENCY_CONFIRM);
          } else if(r.includes("ASK_ZIP")){
            c=c.replace(/ASK_ZIP/g,"").trim();
            setMsgs(p=>[...p,{role:"assistant",content:c}]);
            setStage(STAGE.ZIP_CHECK);
          } else {
            setMsgs(p=>[...p,{role:"assistant",content:c.trim()}]);
          }
        } catch(e){setMsgs(p=>[...p,{role:"assistant",content:`Error: ${e.message||e}. Please call ${settings.phone}.`}]);}
        setLoading(false);
      };

      const steps=["Urgency","Issue","Area","Details","Schedule","Done"];
      const si={[XSTAGE.URGENCY_SELECT]:0,[XSTAGE.URGENCY_CONFIRM]:1,[XSTAGE.PROBLEM]:1,[STAGE.ZIP_CHECK]:2,[STAGE.INFO_FORM]:3,[STAGE.SLOTS]:4,[STAGE.CONFIRMED]:5};
      const cur=si[stage]||0;

      return (
        <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#0c0c16"}}>
          {/* header */}
          <div style={{padding:"11px 16px 0",background:"#10101c",borderBottom:"1px solid #1e1e30",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:11}}>
              <div style={{display:"flex",alignItems:"center",gap:9}}>
                <div style={{width:35,height:35,borderRadius:10,background:`linear-gradient(135deg,${ac},#2563eb)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>{tmpl.emoji}</div>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:"#f0f0ff",fontFamily:"'Syne',sans-serif"}}>{settings.businessName}</div>
                  <div style={{fontSize:10,color:"#22c55e",display:"flex",alignItems:"center",gap:4}}>
                    <span style={{width:5,height:5,borderRadius:"50%",background:"#22c55e",display:"inline-block"}}/>AI Online 24/7
                  </div>
                </div>
              </div>
              {urgency&&<Badge level={urgency}/>}
            </div>
            {/* progress */}
            <div style={{display:"flex",alignItems:"center",marginBottom:11}}>
              {steps.map((s,i)=>(
                <div key={s} style={{display:"flex",alignItems:"center",flex:i<steps.length-1?1:0}}>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                    <div style={{width:19,height:19,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:i<cur?"#22c55e":i===cur?ac:"#1a1a2a",border:`2px solid ${i<cur?"#22c55e":i===cur?ac:"#252540"}`,fontSize:8,fontWeight:700,color:i<=cur?"#fff":"#404060",transition:"all 0.3s"}}>
                      {i<cur?"✓":i+1}
                    </div>
                    <span style={{fontSize:8,color:i===cur?ac:i<cur?"#22c55e":"#353550",fontFamily:"'DM Sans',sans-serif",fontWeight:600,whiteSpace:"nowrap"}}>{s}</span>
                  </div>
                  {i<steps.length-1&&<div style={{flex:1,height:1.5,background:i<cur?"#22c55e40":"#1a1a2a",margin:"0 3px",marginBottom:11,transition:"background 0.3s"}}/>}
                </div>
              ))}
            </div>
          </div>

          {/* messages */}
          <div style={{flex:1,overflowY:"auto",padding:"14px 13px",display:"flex",flexDirection:"column",gap:11}}>
            {msgs.map((m,i)=>(
              <div key={i} style={{display:"flex",gap:9,alignItems:"flex-end",flexDirection:m.role==="user"?"row-reverse":"row",animation:"fadeUp 0.25s ease"}}>
                {m.role==="assistant"&&<div style={{width:27,height:27,borderRadius:"50%",background:"linear-gradient(135deg,#0ea5e9,#2563eb)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ico name="shld" size={12}/></div>}
                <div style={{maxWidth:"78%",padding:"10px 14px",fontSize:13.5,lineHeight:1.65,borderRadius:m.role==="user"?"18px 4px 18px 18px":"4px 18px 18px 18px",background:m.role==="user"?"linear-gradient(135deg,#0ea5e9,#2563eb)":"#1c1c2a",color:"#f0f0f8",whiteSpace:"pre-wrap",fontFamily:"'DM Sans',sans-serif"}}>
                  {m.content}
                </div>
              </div>
            ))}

            {/* urgency selector — shown before any messages */}
            {stage===XSTAGE.URGENCY_SELECT&&<UrgencySelector ac={ac} onSelect={handleUrgencySelect}/>}

            {/* urgency confirm card — shown after AI detects urgency */}
            {stage===XSTAGE.URGENCY_CONFIRM&&<UrgencyConfirm detectedUrgency={detectedUrgency||urgency} ac={ac} onConfirm={handleUrgencyConfirm}/>}



            {/* confirmed */}
            {stage===STAGE.CONFIRMED&&booking&&(
              <div style={{background:"linear-gradient(135deg,#001a2d,#002040)",border:"1px solid #0ea5e960",borderRadius:16,padding:15,margin:"6px 0",animation:"fadeUp 0.3s ease"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:11}}>
                  <div style={{width:24,height:24,borderRadius:"50%",background:"#22c55e",display:"flex",alignItems:"center",justifyContent:"center"}}><Ico name="ok" size={12}/></div>
                  <span style={{color:"#22c55e",fontWeight:700,fontSize:14,fontFamily:"'DM Sans',sans-serif"}}>Booking Confirmed!</span>
                </div>
                {[["Service",booking.service],["When",`${booking.day} · ${booking.time}`],["Name",booking.info&&booking.info.legalName],["Phone",booking.info&&booking.info.phone],["Address",booking.info?`${booking.info.street}, ${booking.info.city} ${booking.info.zip}`:null]].map(([l,v])=>v&&(
                  <div key={l} style={{display:"flex",gap:9,fontSize:12.5,fontFamily:"'DM Sans',sans-serif",marginBottom:5}}>
                    <span style={{color:"#505080",minWidth:70,flexShrink:0}}>{l}</span>
                    <span style={{color:"#d0d0f8",fontWeight:500}}>{v}</span>
                  </div>
                ))}
                <div style={{marginTop:10,padding:"7px 10px",background:"#001040",borderRadius:8,fontSize:11,color:"#60a5fa",display:"flex",alignItems:"center",gap:5,fontFamily:"'DM Sans',sans-serif"}}>
                  <Ico name="cal" size={11}/> Google Calendar updated · SMS sent
                </div>
              </div>
            )}

            {loading&&(
              <div style={{display:"flex",gap:9,alignItems:"center"}}>
                <div style={{width:27,height:27,borderRadius:"50%",background:`linear-gradient(135deg,${ac},#2563eb)`,display:"flex",alignItems:"center",justifyContent:"center"}}><Ico name="shld" size={12}/></div>
                <div style={{padding:"10px 14px",background:"#1c1c2a",borderRadius:"4px 18px 18px 18px",display:"flex",gap:5}}>
                  {[0,1,2].map(d=><span key={d} style={{width:6,height:6,borderRadius:"50%",background:ac,display:"inline-block",animation:`bounce 1.2s ${d*0.2}s infinite`}}/>)}
                </div>
              </div>
            )}
            <div ref={bot}/>
          </div>

          {/* quick replies */}
          {msgs.length<=2&&stage===XSTAGE.PROBLEM&&(
            <div style={{padding:"0 13px 8px",display:"flex",gap:6,flexWrap:"wrap",flexShrink:0}}>
              {settings.services.slice(0,4).map(sv=>(
                <button key={sv} onClick={()=>send(`I need ${sv.toLowerCase()}`)} style={{padding:"5px 11px",borderRadius:18,border:"1px solid #252535",background:"transparent",color:"#8080a8",fontSize:11.5,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",transition:"all 0.2s"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=ac;e.currentTarget.style.color=ac;}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor="#252535";e.currentTarget.style.color="#8080a8";}}>
                  I need {sv.toLowerCase()}
                </button>
              ))}
            </div>
          )}

          {/* input bar - shown during AI conversation */}
          {(stage===XSTAGE.PROBLEM||stage===XSTAGE.URGENCY_CONFIRM)&&(
            <div style={{padding:"7px 13px 15px",flexShrink:0}}>
              <div style={{display:"flex",gap:7,background:"#1a1a28",borderRadius:26,padding:"6px 6px 6px 15px",border:"1px solid #252535"}}>
                <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Describe your issue..." style={{flex:1,background:"none",border:"none",outline:"none",color:"#e0e0f8",fontSize:13.5,fontFamily:"'DM Sans',sans-serif"}}/>
                <button onClick={()=>send()} disabled={loading||!input.trim()} style={{width:34,height:34,borderRadius:"50%",border:"none",cursor:"pointer",background:input.trim()?`linear-gradient(135deg,${ac},#2563eb)`:"#252535",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s"}}>
                  <Ico name="send" size={14}/>
                </button>
              </div>
            </div>
          )}

          {/* zip check - fixed at bottom */}
          {stage===STAGE.ZIP_CHECK&&(
            <div style={{padding:"8px 13px 15px",flexShrink:0}}>
              <ZipCard zips={settings.serviceZips} ac={ac} onResult={(ok,z)=>{setZip(z);if(ok){setMsgs(p=>[...p,{role:"assistant",content:`Great — ZIP ${z} is covered! I just need a few details to book your appointment.`}]);setStage(STAGE.INFO_FORM);}}}/>
            </div>
          )}

          {/* info form - fixed at bottom */}
          {stage===STAGE.INFO_FORM&&(
            <div style={{padding:"8px 13px 15px",flexShrink:0,overflowY:"auto",maxHeight:"60%"}}>
              <InfoForm zip={zip} ac={ac} onSubmit={d=>{setInfo(d);setMsgs(p=>[...p,{role:"assistant",content:`Got it, ${d.legalName.split(" ")[0]}! Here are our open slots. ${urgency==="emergency"?"Emergency dispatch available right now.":"Pick whatever works."}`}]);setStage(STAGE.SLOTS);}}/>
            </div>
          )}

          {/* slot picker - fixed at bottom */}
          {stage===STAGE.SLOTS&&!booking&&(
            <div style={{padding:"8px 13px 15px",flexShrink:0}}>
              <SlotPick slots={slots} urgency={urgency} ac={ac} onSelect={slot=>{const b={service:service||settings.services[0],day:slot.day,time:slot.emergency?"ASAP (30-60 min)":slot.time,urgency,info,at:new Date().toISOString()};setBooking(b);onBooked(b);setMsgs(p=>[...p,{role:"assistant",content:`You're all set, ${info&&info.legalName.split(" ")[0]}! 🎉 Confirmed for ${slot.day}${slot.emergency?" — emergency dispatch":" at "+slot.time}. SMS sent to ${info&&info.phone}.`}]);setStage(STAGE.CONFIRMED);}}/>
            </div>
          )}
        </div>
      );
    }

    function ZipCard({zips, ac, onResult}) {
      const [zip,setZip]=useState(""), [st,setSt]=useState(null), ref=useRef(null);
      useEffect(()=>{if(ref.current)ref.current.focus();},[]);
      const check=()=>{if(zip.length!==5)return;setSt("checking");setTimeout(()=>{const ok=zips.includes(zip);setSt(ok?"ok":"no");if(ok)setTimeout(()=>onResult(true,zip),700);},600);};
      return (
        <div style={{background:"#13131e",border:"1px solid #252535",borderRadius:16,overflow:"hidden",margin:"6px 0",animation:"fadeUp 0.3s ease"}}>
          <div style={{padding:"11px 15px",borderBottom:"1px solid #252535",display:"flex",alignItems:"center",gap:7}}>
            <span>📍</span><span style={{fontSize:11,fontWeight:700,color:"#a0a0c0",letterSpacing:"0.05em",textTransform:"uppercase",fontFamily:"'DM Sans',sans-serif"}}>Service Area Check</span>
          </div>
          <div style={{padding:14}}>
            <p style={{fontSize:13,color:"#8080a8",marginBottom:11,lineHeight:1.6,fontFamily:"'DM Sans',sans-serif"}}>Enter your ZIP code to confirm we can reach you.</p>
            <div style={{display:"flex",gap:8}}>
              <input ref={ref} value={zip} onChange={e=>{setZip(e.target.value.replace(/\D/g,"").slice(0,5));setSt(null);}} onKeyDown={e=>e.key==="Enter"&&zip.length===5&&check()} placeholder="e.g. 80203" maxLength={5}
                style={{flex:1,padding:"9px 14px",background:"#1a1a2a",border:`1px solid ${st==="ok"?"#22c55e":st==="no"?"#ef4444":"#252540"}`,borderRadius:10,color:"#e0e0f8",fontSize:16,letterSpacing:"0.15em",outline:"none",fontFamily:"'DM Sans',sans-serif",textAlign:"center",transition:"border-color 0.2s"}}/>
              <button onClick={check} disabled={zip.length!==5} style={{padding:"9px 16px",borderRadius:10,border:"none",cursor:zip.length===5?"pointer":"not-allowed",background:zip.length===5?"linear-gradient(135deg,#0ea5e9,#2563eb)":"#1a1a2a",color:"#fff",fontSize:13,fontWeight:700,opacity:zip.length===5?1:0.4,fontFamily:"'DM Sans',sans-serif"}}>
                {st==="checking"?"...":"Check"}
              </button>
            </div>
            {st==="ok"&&<div style={{marginTop:9,padding:"9px 12px",background:"#001a0a",border:"1px solid #22c55e40",borderRadius:10,fontSize:12,color:"#22c55e",animation:"fadeUp 0.2s ease",fontFamily:"'DM Sans',sans-serif"}}>✅ ZIP {zip} is in our service area!</div>}
            {st==="no"&&<div style={{marginTop:9,padding:"9px 12px",background:"#1c0000",border:"1px solid #ef444440",borderRadius:10,fontSize:12,color:"#ef4444",fontFamily:"'DM Sans',sans-serif"}}>❌ ZIP {zip} is outside our service area. Call us for referrals.</div>}
          </div>
        </div>
      );
    }

    function InfoForm({zip, ac, onSubmit}) {
      const [f,setF]=useState({legalName:"",phone:"",street:"",city:"",state:"CO",zip});
      const [err,setErr]=useState({});
      const [sub,setSub]=useState(false);
      const set=(k,v)=>setF(p=>({...p,[k]:v}));
      const go=()=>{
        const e={};
        if(f.legalName.trim().split(" ").length<2)e.legalName="Full legal name required";
        if(!/^\+1 \(\d{3}\) \d{3}-\d{4}$/.test(f.phone))e.phone="Format: +1 (000) 000-0000";
        if(!f.street.trim())e.street="Required";
        if(!f.city.trim())e.city="Required";
        if(Object.keys(e).length){setErr(e);return;}
        setSub(true);setTimeout(()=>onSubmit(f),400);
      };
      const is=(k)=>({padding:"9px 11px",background:"#1a1a2a",border:`1px solid ${err[k]?"#ef4444":"#252540"}`,borderRadius:10,color:"#e0e0f8",fontSize:13,outline:"none",fontFamily:"'DM Sans',sans-serif",width:"100%"});
      const Lb=({c})=><label style={{fontSize:10,fontWeight:700,color:"#606080",letterSpacing:"0.06em",textTransform:"uppercase",display:"block",marginBottom:4,fontFamily:"'DM Sans',sans-serif"}}>{c}</label>;

      return (
        <div style={{background:"#13131e",border:"1px solid #252535",borderRadius:16,overflow:"hidden",margin:"6px 0",animation:"fadeUp 0.3s ease"}}>
          <div style={{padding:"11px 15px",borderBottom:"1px solid #252535",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:7}}><span>👤</span><span style={{fontSize:11,fontWeight:700,color:"#a0a0c0",letterSpacing:"0.05em",textTransform:"uppercase",fontFamily:"'DM Sans',sans-serif"}}>Your Information</span></div>
            <span style={{fontSize:10,padding:"2px 8px",background:"#001428",color:"#60a5fa",borderRadius:10,border:"1px solid #60a5fa40",fontFamily:"'DM Sans',sans-serif"}}>🔒 Secure</span>
          </div>
          <div style={{padding:14,display:"flex",flexDirection:"column",gap:9}}>
            <div><Lb c="Legal Full Name"/><input value={f.legalName} onChange={e=>{set("legalName",e.target.value);setErr(v=>({...v,legalName:null}));}} placeholder="John Smith" style={is("legalName")}/>{err.legalName&&<span style={{fontSize:11,color:"#ef4444",fontFamily:"'DM Sans',sans-serif"}}>{err.legalName}</span>}</div>
            <div><Lb c="Phone Number"/><input value={f.phone} onChange={e=>{set("phone",formatPhone(e.target.value));setErr(v=>({...v,phone:null}));}} placeholder="+1 (720) 555-0100" type="tel" style={is("phone")}/>{err.phone&&<span style={{fontSize:11,color:"#ef4444",fontFamily:"'DM Sans',sans-serif"}}>{err.phone}</span>}</div>
            <div><Lb c="Street Address"/><input value={f.street} onChange={e=>{set("street",e.target.value);setErr(v=>({...v,street:null}));}} placeholder="123 Main St" style={is("street")}/>{err.street&&<span style={{fontSize:11,color:"#ef4444",fontFamily:"'DM Sans',sans-serif"}}>{err.street}</span>}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 46px 76px",gap:7}}>
              <div><Lb c="City"/><input value={f.city} onChange={e=>{set("city",e.target.value);setErr(v=>({...v,city:null}));}} placeholder="Denver" style={is("city")}/></div>
              <div><Lb c="State"/><input value={f.state} readOnly style={{...is(),background:"#111120",color:"#505070"}}/></div>
              <div><Lb c="ZIP"/><input value={f.zip} onChange={e=>set("zip",e.target.value.replace(/\D/g,"").slice(0,5))} style={is("zip")}/></div>
            </div>
            <div style={{padding:"8px 11px",background:"#0d0d18",borderRadius:9,border:"1px solid #1e1e30",fontSize:11,color:"#505070",fontFamily:"'DM Sans',sans-serif"}}>🔒 Only shared with the assigned technician.</div>
            <button onClick={go} disabled={sub} style={{padding:12,borderRadius:12,border:"none",cursor:"pointer",background:sub?"#1a1a2a":`linear-gradient(135deg,${ac},#2563eb)`,color:"#fff",fontSize:14,fontWeight:700,fontFamily:"'Syne',sans-serif",transition:"all 0.2s"}}>
              {sub?"Saving...":"Continue to Scheduling →"}
            </button>
          </div>
        </div>
      );
    }

    function SlotPick({slots, urgency, ac, onSelect}) {
      const days=[...new Set(slots.map(s=>s.day))];
      const [day,setDay]=useState(days[0]);
      const ds=slots.filter(s=>s.day===day&&!s.booked);
      return (
        <div style={{background:"#13131e",border:"1px solid #252535",borderRadius:16,overflow:"hidden",margin:"6px 0",animation:"fadeUp 0.3s ease"}}>
          <div style={{padding:"11px 15px",borderBottom:"1px solid #252535",display:"flex",alignItems:"center",gap:7}}>
            <Ico name="cal" size={14}/><span style={{fontSize:11,fontWeight:700,color:"#a0a0c0",letterSpacing:"0.05em",textTransform:"uppercase",fontFamily:"'DM Sans',sans-serif"}}>Available Times</span>
          </div>
          {urgency==="emergency"&&(
            <div style={{padding:"9px 13px",borderBottom:"1px solid #252535"}}>
              <button onClick={()=>onSelect({id:"emg",day:"Today",time:"ASAP",emergency:true})} style={{width:"100%",padding:"10px 14px",background:"#3d0000",border:"1px solid #ff4444",borderRadius:11,color:"#ff6666",cursor:"pointer",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"space-between",fontFamily:"'DM Sans',sans-serif"}}>
                <span>🚨 Dispatch Emergency Tech Now</span><span style={{fontSize:11,opacity:0.8}}>30-60 min</span>
              </button>
            </div>
          )}
          <div style={{display:"flex",borderBottom:"1px solid #252535",overflowX:"auto"}}>
            {days.map(d=><button key={d} onClick={()=>setDay(d)} style={{padding:"8px 12px",border:"none",background:"transparent",cursor:"pointer",color:day===d?ac:"#606080",fontSize:11,fontWeight:600,borderBottom:day===d?`2px solid ${ac}`:"2px solid transparent",whiteSpace:"nowrap",fontFamily:"'DM Sans',sans-serif",transition:"color 0.2s"}}>{d}</button>)}
          </div>
          <div style={{padding:"11px 13px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
            {ds.length===0
              ?<div style={{gridColumn:"span 2",textAlign:"center",color:"#505070",fontSize:13,padding:"14px 0",fontFamily:"'DM Sans',sans-serif"}}>No slots this day</div>
              :ds.map(s=>(
                <button key={s.id} onClick={()=>onSelect(s)} style={{padding:"9px 13px",background:"#1a1a2e",border:"1px solid #252540",borderRadius:9,color:"#d0d0f0",cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:6,transition:"all 0.15s",fontFamily:"'DM Sans',sans-serif"}}
                  onMouseEnter={e=>{e.currentTarget.style.background=ac+"20";e.currentTarget.style.borderColor=ac;e.currentTarget.style.color=ac;}}
                  onMouseLeave={e=>{e.currentTarget.style.background="#1a1a2e";e.currentTarget.style.borderColor="#252540";e.currentTarget.style.color="#d0d0f0";}}>
                  <Ico name="clk" size={12}/>{s.time}
                </button>
              ))
            }
          </div>
        </div>
      );
    }

    // ── DASHBOARD ──
    function Dash({bookings, settings, lang="en"}) {
      const t = T[lang]||T.en;
      const [filt,setFilt]=useState("all");
      const tmpl=TEMPLATES[settings.businessType]||{emoji:settings.customEmoji||"🏢",label:settings.customLabel||settings.businessType,color:settings.customColor||"#0ea5e9"}, ac=tmpl.color;
      const ord={emergency:0,high:1,normal:2};
      const sorted=[...bookings].sort((a,b)=>(ord[a.urgency]||3)-(ord[b.urgency]||3));
      const shown=filt==="all"?sorted:sorted.filter(b=>b.urgency===filt);
      return (
        <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#09090f",overflowY:"auto"}}>
          <div style={{padding:"16px 18px 0",background:"#0d0d18",borderBottom:"1px solid #1e1e30",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:13}}>
              <span style={{fontSize:20}}>{tmpl.emoji}</span>
              <div>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:17,fontWeight:800,color:"#f0f0ff"}}>{settings.businessName}</div>
                <div style={{fontSize:11,color:"#505070",marginTop:2,fontFamily:"'DM Sans',sans-serif"}}>{t.aiLive} · {settings.serviceZips.length} {t.zips} · {settings.services.length} {t.services}</div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:9,marginBottom:13}}>
              {[[t.bookings,bookings.length,"#60a5fa"],[t.emergency,bookings.filter(b=>b.urgency==="emergency").length,"#ff4444"],[t.today,bookings.filter(b=>b.day==="Today").length,"#22c55e"]].map(([l,v,c])=>(

      if (digits.length <= 3) return `+1 (${digits}`;
      if (digits.length <= 6) return `+1 (${digits.slice(0,3)}) ${digits.slice(3)}`;
      return `+1 (${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6)}`;

            </div>
            <div style={{display:"flex",gap:6,marginBottom:14}}>
              {[["all",t.filterAll],["emergency",t.filterEmerg],["high",t.filterUrgent],["normal",t.filterStd]].map(([k,l])=>(
                <button key={k} onClick={()=>setFilt(k)} style={{padding:"7px 10px",border:"none",background:"transparent",cursor:"pointer",color:filt===k?ac:"#505070",fontSize:10,fontWeight:600,borderBottom:filt===k?`2px solid ${ac}`:"2px solid transparent",fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap"}}>{l}</button>
              ))}
            </div>
          </div>

          <div style={{padding:"14px 18px",display:"flex",flexDirection:"column",gap:9}}>
            {/* CTA to try the chat — only shown when no bookings yet */}
            {bookings.length===0&&(
              <div style={{background:"linear-gradient(135deg,rgba(14,165,233,0.08),rgba(99,102,241,0.08))",border:`1px solid ${ac}40`,borderRadius:14,padding:"18px 16px",textAlign:"center",animation:"fadeUp 0.4s ease"}}>
                <div style={{fontSize:28,marginBottom:8}}>🤖</div>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:15,fontWeight:800,color:"#e0e0ff",marginBottom:6}}>Your AI agent is live!</div>
                <div style={{fontSize:13,color:"#606080",fontFamily:"'DM Sans',sans-serif",marginBottom:14,lineHeight:1.6}}>
                  See it in action — try booking an appointment as a customer would.
                </div>
                <button onClick={onTryChat} style={{padding:"11px 28px",borderRadius:10,border:"none",cursor:"pointer",background:`linear-gradient(135deg,${ac},#6366f1)`,color:"#fff",fontFamily:"'Syne',sans-serif",fontSize:13,fontWeight:800,boxShadow:`0 0 20px ${ac}40`,transition:"all 0.2s"}}
                  onMouseEnter={e=>e.currentTarget.style.opacity="0.85"}
                  onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
                  💬 Talk to your AI agent →
                </button>
              </div>
            )}

            {shown.length===0&&bookings.length>0
              ?<div style={{textAlign:"center",padding:"36px 0",color:"#404060",fontFamily:"'DM Sans',sans-serif",fontSize:14}}><div style={{fontSize:30,marginBottom:8}}>📭</div>{t.noBookings}</div>
              :shown.map((b,i)=>{
                const isNew = b.id===newBookingId;
                return (
                  <div key={i} style={{background:isNew?"#0d1a0d":"#13131f",border:`1px solid ${isNew?"#22c55e60":"#1e1e30"}`,borderRadius:13,padding:"13px 15px",borderLeft:`3px solid ${b.urgency==="emergency"?"#ff4444":b.urgency==="high"?"#f97316":"#60a5fa"}`,animation:isNew?"newBooking 0.6s ease":"fadeUp 0.3s ease",position:"relative"}}>
                    {isNew&&<div style={{position:"absolute",top:8,right:10,fontSize:10,fontWeight:700,color:"#22c55e",fontFamily:"'DM Sans',sans-serif",background:"#22c55e18",padding:"2px 8px",borderRadius:10,border:"1px solid #22c55e40"}}>✨ New</div>}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5}}>
                      <div>
                        <div style={{fontSize:14,fontWeight:700,color:"#e0e0f8",fontFamily:"'Syne',sans-serif"}}>{b.info&&b.info.legalName||"Unknown"}</div>
                        <div style={{fontSize:12,color:ac,marginTop:1,fontFamily:"'DM Sans',sans-serif"}}>{b.service}</div>
                      </div>
                      <Badge level={b.urgency||"normal"} lang="en"/>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:2,fontSize:12,color:"#505070",fontFamily:"'DM Sans',sans-serif"}}>
                      <span>🕐 {b.day} · {b.time}</span>
                      {b.info&&b.info.phone&&<span>📞 {b.info.phone}</span>}
                      {b.info&&<span>📍 {b.info.street}, {b.info.city} {b.info.zip}</span>}
                    </div>
                    <div style={{marginTop:9,padding:"5px 9px",background:"#001428",borderRadius:7,fontSize:11,color:"#2563eb",display:"flex",alignItems:"center",gap:5,fontFamily:"'DM Sans',sans-serif"}}>
                      <Ico name="cal" size={11}/> Google Calendar updated ✓
                    </div>
                  </div>
                );
              })
            }

            {/* after booking: invite to try chat again */}
            {bookings.length>0&&(
              <button onClick={onTryChat} style={{marginTop:4,padding:"10px",borderRadius:10,border:`1px solid ${ac}30`,background:"transparent",cursor:"pointer",color:ac,fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:600,transition:"all 0.2s"}}
                onMouseEnter={e=>e.currentTarget.style.background=ac+"10"}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                + Book another appointment
              </button>
            )}
          </div>
        </div>
      );
    }

    // ── MAIN APP ──
    function App() {
      // Demo flow: "intro" → "setup" → "main"
      const [screen, setScreen] = useState("intro");
      const [apiReady, setApiReady] = useState(false);
      const [settings, setSettings] = useState(defaultSettings("plumber"));
      const [bookings, setBookings] = useState([]);
      const [chatKey, setChatKey] = useState(0);
      const [showChat, setShowChat] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [lang, setLang] = useState("en");
      const [newBookingId, setNewBookingId] = useState(null);
      const isDesktop = useIsDesktop();
      const t = T[lang]||T.en;
      const ac = (TEMPLATES[settings.businessType]||{color:settings.customColor||'#0ea5e9'}).color;

      const handleLaunch = (s) => { setSettings(s); setScreen("main"); setShowChat(false); };

      const handleBooked = (b) => {
        const id = Date.now().toString();
        b.id = id;
        setBookings(p=>[b,...p]);
        setNewBookingId(id);
        setShowChat(false); // return to dashboard
        setTimeout(()=>setNewBookingId(null), 5000);
      };

      const handleTryChat = () => { setChatKey(k=>k+1); setShowChat(true); };

      // Show key entry if not set
      if (!apiReady) return <KeyEntry onKey={k=>{ANTHROPIC_API_KEY=k; setApiReady(true);}} />;
      if (screen==="intro") return <IntroScreen onStart={()=>setScreen("setup")}/>;
      if (screen==="setup") return <SetupScreen onLaunch={handleLaunch}/>;

      // ── MAIN SCREEN (desktop) ──
      if (isDesktop) {
        return (
          <div style={{display:"flex",flexDirection:"column",height:"100dvh",background:"#080810"}}>
            {/* top bar */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#070710",borderBottom:"1px solid #141420",padding:"7px 20px",flexShrink:0}}>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:17,fontWeight:800,color:"#fff",letterSpacing:"-0.01em"}}>book<span style={{color:ac}}>io</span></div>
                <div style={{width:1,height:16,background:"#1e1e30"}}/>
                <button onClick={()=>setScreen("setup")} style={{fontSize:11,color:"#505070",fontFamily:"'DM Sans',sans-serif",background:"none",border:"none",cursor:"pointer",padding:0}}
                  onMouseEnter={e=>e.currentTarget.style.color="#a0a0c0"}
                  onMouseLeave={e=>e.currentTarget.style.color="#505070"}>
                  ← Change business type
                </button>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <LangToggle lang={lang} setLang={setLang} ac={ac}/>
                <button onClick={()=>setShowSettings(s=>!s)} style={{padding:"5px 14px",borderRadius:10,border:`1px solid ${showSettings?ac+"80":"#252535"}`,background:showSettings?`${ac}18`:"transparent",color:showSettings?ac:"#606080",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'DM Sans',sans-serif",display:"flex",alignItems:"center",gap:5,transition:"all 0.2s"}}>
                  <Ico name={showSettings?"grid":"cog"} size={13}/>
                  {showSettings ? t.backDash : t.openSettings}
                </button>
              </div>
            </div>

            {/* main area */}
            <div style={{flex:1,display:"flex",overflow:"hidden"}}>
              {/* LEFT: dashboard or settings */}
              <div style={{flex:1,overflow:"hidden",borderRight:showChat?"1px solid #1a1a28":"none"}}>
                {showSettings
                  ? <Settings settings={settings} onSave={(ns)=>{setSettings(ns);setShowSettings(false);}} lang={lang}/>
                  : <DashWithCTA bookings={bookings} settings={settings} lang={lang} onTryChat={handleTryChat} newBookingId={newBookingId}/>
                }
              </div>

              {/* RIGHT: chat panel — slides in when active */}
              {showChat&&(
                <div style={{width:"44%",display:"flex",flexDirection:"column",overflow:"hidden",animation:"slideIn 0.35s ease"}}>
                  <div style={{padding:"10px 16px",background:"#0d0d18",borderBottom:"1px solid #1e1e30",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <span style={{fontSize:10,fontWeight:700,color:"#505070",letterSpacing:"0.08em",textTransform:"uppercase",fontFamily:"'DM Sans',sans-serif"}}>💬 Customer View</span>
                    <button onClick={()=>setShowChat(false)} style={{background:"none",border:"none",color:"#505070",cursor:"pointer",fontSize:11,fontFamily:"'DM Sans',sans-serif",display:"flex",alignItems:"center",gap:4}}
                      onMouseEnter={e=>e.currentTarget.style.color="#a0a0c0"}
                      onMouseLeave={e=>e.currentTarget.style.color="#505070"}>
                      ← Back to dashboard
                    </button>
                  </div>
                  <div style={{flex:1,overflow:"hidden"}}>
                    <Chat key={chatKey} settings={settings} onBooked={handleBooked}/>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      // ── MOBILE MAIN ──
      const mobileView = showChat ? "chat" : showSettings ? "settings" : "dashboard";
      return (
        <div style={{maxWidth:430,margin:"0 auto",height:"100dvh",display:"flex",flexDirection:"column"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#070710",borderBottom:"1px solid #141420",padding:"9px 14px",flexShrink:0}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:16,fontWeight:800,color:"#fff"}}>book<span style={{color:ac}}>io</span></div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <LangToggle lang={lang} setLang={setLang} ac={ac}/>
              <button onClick={()=>setScreen("setup")} style={{fontSize:10,color:"#505070",fontFamily:"'DM Sans',sans-serif",background:"none",border:"1px solid #252535",borderRadius:8,cursor:"pointer",padding:"4px 8px"}}>← Setup</button>
            </div>
          </div>
          {/* nav tabs */}
          <div style={{display:"flex",background:"#0d0d18",borderBottom:"1px solid #1e1e30",flexShrink:0}}>
            {[{k:"dashboard",l:t.navDashboard,i:"grid"},{k:"settings",l:t.navSettings,i:"cog"}].map(tab=>{
              const active=mobileView===tab.k;
              return (
                <button key={tab.k} onClick={()=>{setShowChat(false);setShowSettings(tab.k==="settings");}}
                  style={{flex:1,padding:"10px 4px",border:"none",background:"transparent",cursor:"pointer",color:active?ac:"#505070",fontSize:10,fontWeight:600,borderBottom:active?`2px solid ${ac}`:"2px solid transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:3,fontFamily:"'DM Sans',sans-serif",letterSpacing:"0.05em",textTransform:"uppercase",transition:"color 0.2s"}}>
                  <Ico name={tab.i} size={15}/>{tab.l}
                  {tab.k==="dashboard"&&bookings.length>0&&!showChat&&<span style={{position:"absolute",marginTop:-8,marginLeft:16,width:14,height:14,background:ac,borderRadius:"50%",fontSize:8,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700}}>{bookings.length}</span>}
                </button>
              );
            })}
          </div>
          <div style={{flex:1,overflow:"hidden"}}>
            {mobileView==="chat"&&<Chat key={chatKey} settings={settings} onBooked={handleBooked}/>}
            {mobileView==="settings"&&<Settings settings={settings} onSave={(ns)=>{setSettings(ns);setShowSettings(false);}} lang={lang}/>}
            {mobileView==="dashboard"&&<DashWithCTA bookings={bookings} settings={settings} lang={lang} onTryChat={handleTryChat} newBookingId={newBookingId}/>}
          </div>
        </div>
      );
    }

    try {
      ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
    } catch(e) {
      document.getElementById("root").innerHTML = '<div style="color:#ff4444;padding:40px;font-family:monospace;background:#0a0010;min-height:100vh;"><h2>JS Error:</h2><pre>' + e.message + '</pre><pre>' + (e.stack||'') + '</pre></div>';
    }
  </script>
</body>
</html>
