    function makeSlots(settings, bookedSlotIds=[]) {
      const slots = [], now = new Date();
      const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      const durMin = settings.serviceDuration || 60; // minutes
      const stepMin = durMin; // slot interval = duration
      for (let d = 0; d < 7; d++) {
        const day = new Date(now); day.setDate(now.getDate() + d);
        const dk = dayNames[day.getDay()], dh = settings.hours[dk];
        if (!dh || !dh.open) continue;
        const sh = parseInt(dh.start) * 60; // minutes from midnight
        const eh = parseInt(dh.end) * 60;
        const dl = d===0?"Today":d===1?"Tomorrow":`${dk} ${months[day.getMonth()]} ${day.getDate()}`;
        for (let m = sh; m + stepMin <= eh; m += stepMin) {
          const hh = Math.floor(m/60), mm = m%60;
          if (d===0 && hh <= now.getHours()) continue;
          const label = hh===0?"12:"+String(mm).padStart(2,"0")+" AM"
            :hh<12?`${hh}:${String(mm).padStart(2,"0")} AM`
            :hh===12?`12:${String(mm).padStart(2,"0")} PM`
            :`${hh-12}:${String(mm).padStart(2,"0")} PM`;
          const id = `s-${d}-${hh}-${mm}`;
          slots.push({id, day:dl, time:label, booked: bookedSlotIds.includes(id)});
        }
      }
      return slots;
    }

    async function askAI(messages, system) {

        headers: {"Content-Type":"application/json"},

      });
      const d = await r.json();
      if (d.error) throw new Error(d.error.message);
      return d.content?.map(c=>c.text||"").join("") || "";
    }

    // ── PRICE RANGE HELPERS ──
    // Parses "$100-$500" → {min:"100", max:"500"}
    const parsePriceRange = (str) => {
      if (!str) return {min:"", max:""};
      const m = str.match(/\$?([\d,]+)\s*[-–]\s*\$?([\d,]+)/);
      if (m) return {min:m[1].replace(/,/g,""), max:m[2].replace(/,/g,"")};
      const single = str.match(/\$?([\d,]+)/);
      if (single) return {min:single[1].replace(/,/g,""), max:""};
      return {min:"", max:""};
    };
    const buildPriceRange = (min, max) => {
      const a = min.replace(/\D/g,""), b = max.replace(/\D/g,"");
      if (!a && !b) return "";
      if (a && !b) return `$${a}`;
      return `$${a}-$${b}`;
    };
    const fmtDigits = (v) => v.replace(/\D/g,"").slice(0,7);

    // Price range editor for existing services
    function PriceRange({svc, price, ac, lang, onChange}) {
      const {min:initMin, max:initMax} = parsePriceRange(price);

      const [mx, setMx] = useState(initMax);
      const update = (newMn, newMx) => {
        setMn(newMn); setMx(newMx);
        onChange(buildPriceRange(newMn, newMx));
      };
      const inpStyle = {padding:"5px 9px",background:"#0b0d1e",border:`1px solid ${ac}40`,borderRadius:8,color:ac,fontSize:12,outline:"none",fontFamily:"'Inter',sans-serif",width:"100%"};

    }

    // ── SERVICE TAB ──
    function SvcTab({s, setS, ac, lang, t}) {
      const [newSvcName, setNewSvcName] = useState("");

      const inp = {padding:"7px 10px",background:"#0c0e24",border:"1px solid #2a2d52",borderRadius:8,color:"#e0e0f8",fontSize:12,outline:"none",fontFamily:"'Inter',sans-serif"};

      // We track "allServices" as s.customServices (user-added) merged with template defaults

      const toggleSvc = (svc) => {
        // For built-in services: toggle active state via a separate activeServices list
        setS(p => {
          const active = p.activeSvcList || [...p.services];
          const next = active.includes(svc) ? active.filter(x=>x!==svc) : [...active, svc];
          return {...p, activeSvcList: next};
        });
      };

      const isActive = (svc) => {
        if (!s.activeSvcList) return true; // default all on
        return s.activeSvcList.includes(svc);

      const addSvc = () => {
        const name = newSvcName.trim();
        if (!name) return;

          ...p,

          activeSvcList: [...(p.activeSvcList || p.services), name],

    // ── AREA TAB ──
    function AreaTab({s, setS, ac, inp, lang, t, zipIn, setZipIn, addZip, delZip}) {
      const [autoStatus, setAutoStatus] = useState(null); // null | "loading" | "done" | "error"
      const [autoCount, setAutoCount] = useState(0);

      const autoGenZips = async () => {
        const city = s.city?.trim();
        const state = s.state?.trim();
        if (!city || !state) { setAutoStatus("error"); return; }
        setAutoStatus("loading");
        try {
          // Use zippopotam.us free API - search by city+state
          const res = await fetch(`https://api.zippopotam.us/us/${encodeURIComponent(state)}/${encodeURIComponent(city)}`);
          if (!res.ok) throw new Error("not found");
          const data = await res.json();
          const newZips = data.places.map(p => p["post code"]);
          const merged = [...new Set([...s.serviceZips, ...newZips])];
          setS(p => ({...p, serviceZips: merged}));
          setAutoCount(newZips.length);
          setAutoStatus("done");
          setTimeout(() => setAutoStatus(null), 3000);
        } catch(e) {
          setAutoStatus("error");
          setTimeout(() => setAutoStatus(null), 3000);
        }
      };

      const clearAll = () => setS(p => ({...p, serviceZips: []}));

      return (
        <div>
          <div style={{fontSize:10,fontWeight:700,color:"#52558a",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8,fontFamily:"'Inter',sans-serif"}}>{t.serviceZips}</div>
          <p style={{fontSize:12,color:"#757aa8",marginBottom:12,fontFamily:"'Inter',sans-serif",lineHeight:1.6}}>
            <strong style={{color:"#d0d0f0"}}>{s.serviceZips.length} ZIPs</strong> {lang==="zh"?"个邮编已覆盖":"covered"}. {lang==="zh"?"范围外客户会被自动提示。":"Customers outside are redirected automatically."}
          </p>

          {/* Auto-generate from address */}
          <div style={{marginBottom:14,padding:"12px 14px",background:"#0c0e24",border:`1px solid ${ac}30`,borderRadius:12}}>
            <div style={{fontSize:11,fontWeight:700,color:ac,marginBottom:6,fontFamily:"'Inter',sans-serif"}}>
              📍 {lang==="zh"?"根据商家地址自动生成邮编":"Auto-generate ZIPs from business address"}
            </div>
            <div style={{fontSize:11,color:"#6b6f9a",marginBottom:10,fontFamily:"'Inter',sans-serif"}}>
              {lang==="zh"
                ? `当前地址: ${s.city||"—"}, ${s.state||"—"} · 在Business标签修改地址`
                : `Current: ${s.city||"—"}, ${s.state||"—"} · Edit in Business tab`}
            </div>
            <button onClick={autoGenZips} disabled={autoStatus==="loading"} style={{width:"100%",padding:"9px",borderRadius:10,border:`1px solid ${ac}60`,background:autoStatus==="loading"?`${ac}10`:`${ac}18`,color:autoStatus==="loading"?"#757aa8":ac,cursor:autoStatus==="loading"?"not-allowed":"pointer",fontSize:12,fontWeight:700,fontFamily:"'Inter',sans-serif",transition:"all 0.2s",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              {autoStatus==="loading"
                ? <><span style={{animation:"spin 1s linear infinite",display:"inline-block"}}>⟳</span> {lang==="zh"?"查询中...":"Searching..."}</>
                : autoStatus==="done"
                ? `✅ ${lang==="zh"?`已添加 ${autoCount} 个邮编`:`Added ${autoCount} ZIPs`}`
                : autoStatus==="error"
                ? `❌ ${lang==="zh"?"未找到，请检查城市名":"Not found, check city name"}`
                : `🔍 ${lang==="zh"?"自动获取周边邮编":"Fetch ZIPs for my area"}`
              }
            </button>
          </div>

          {/* Manual add */}
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <input value={zipIn} onChange={e=>setZipIn(e.target.value.replace(/\D/g,"").slice(0,5))} onKeyDown={e=>e.key==="Enter"&&addZip()} placeholder={t.addZip} maxLength={5} style={{...inp,flex:1}} />
            <button onClick={addZip} disabled={zipIn.length!==5} style={{padding:"9px 14px",borderRadius:10,border:"none",cursor:zipIn.length===5?"pointer":"not-allowed",background:zipIn.length===5?ac:"#2a2d4a",color:"#fff",opacity:zipIn.length===5?1:0.4}}>
              <Ico name="plus" size={15}/>
            </button>
          </div>

          {/* Quick presets + clear */}
          <div style={{display:"flex",gap:7,marginBottom:12,flexWrap:"wrap"}}>
            <button onClick={clearAll} style={{padding:"4px 11px",borderRadius:14,border:"1px solid #3d0000",background:"transparent",color:"#ff4444",fontSize:11,cursor:"pointer",fontFamily:"'Inter',sans-serif"}}>{t.clearAll}</button>
          </div>

          {/* ZIP list */}
          <div style={{maxHeight:220,overflowY:"auto",display:"flex",flexWrap:"wrap",gap:6}}>
            {s.serviceZips.sort().map(z=>(
              <div key={z} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 9px",background:"#111428",border:"1px solid #2a2d4a",borderRadius:20,fontSize:12,color:"#d0d0f0",fontFamily:"'Inter',sans-serif"}}>

      const [urgency, setUrgency] = useState(null);
      const [detectedUrgency, setDetectedUrgency] = useState(null);
      const [service, setService] = useState("");
      const [zip, setZip] = useState(null);
      const [info, setInfo] = useState(null);
      const [booking, setBooking] = useState(null);

      useEffect(()=>{ if(bot.current) bot.current.scrollIntoView({behavior:"smooth"}); },[msgs,stage]);

      const handleUrgencySelect = (level) => {
        setUrgency(level);
        const greetMap = {
          emergency: `🚨 Hi, this is Annie — your AI booking agent for ${settings.businessName}. I see you've marked this as an emergency. I'll make sure we get to you fast.

${tmpl.greeting} What's happening right now?`,
          high: `⚡ Hi, this is Annie — your AI booking agent for ${settings.businessName}. I see this is urgent. We'll do our best to get someone out today.

${tmpl.greeting} What's going on?`,
          normal: `👋 Hi, this is Annie — your AI booking agent for ${settings.businessName}.

${tmpl.greeting} What can I help you with today?`,
        };
        setMsgs([{role:"assistant", content: greetMap[level]}]);
        setStage(XSTAGE.PROBLEM);
      };

      const handleUrgencyConfirm = (confirmedLevel) => {
        setUrgency(confirmedLevel);
        setMsgs(p=>[...p, {role:"assistant", content:`Got it — marked as ${confirmedLevel==="emergency"?"🚨 Emergency":confirmedLevel==="high"?"⚡ Urgent":"📅 Regular"}. What's your ZIP code so I can confirm we cover your area?`}]);
        setStage(STAGE.ZIP_CHECK);
      };

      const activeSvcs = (settings.activeSvcList || settings.services).filter(sv => settings.services.includes(sv));
      const svcWithPrices = activeSvcs.map(sv => {
        const price = settings.customPrices?.[sv];
        return price ? `${sv} (${price})` : sv;
      }).join(", ");
      const emergWords = tmpl.emergencyWords && tmpl.emergencyWords.length ? tmpl.emergencyWords.join(", ") : "urgent, emergency, asap, broken, no heat, no water, flooding, leak";

      const sys = `You are Annie, an AI booking agent for ${settings.businessName}, a ${tmpl.label} business in ${settings.city}, ${settings.state}. Always refer to yourself as Annie.

ACTIVE SERVICES (with price ranges): ${svcWithPrices || "General services"}

STEP 1 — CHECK IF IN SCOPE:
First, determine if the customer's request matches any of the active services above.
- If OUT OF SCOPE: Politely say you don't offer that service, list what you DO offer, and ask if any of those would help. Do NOT tag URGENCY or SERVICE. Do NOT say ASK_ZIP_CONFIRM.
- If IN SCOPE: continue to Step 2.

STEP 2 — URGENCY:
Assess urgency based on the problem described.
Emergency keywords (if any): ${emergWords}
Tag exactly one: URGENCY:EMERGENCY / URGENCY:HIGH / URGENCY:NORMAL

STEP 3 — TAG SERVICE:
Tag the best matching service: SERVICE:[exact service name from list]

STEP 4 — END:
After understanding the issue, end your message with ASK_ZIP_CONFIRM to trigger the next step.

Rules:
- Keep replies short (2-3 sentences max) and warm
- Never make up services not on the list
- If unsure which service, ask one clarifying question`;

      const send = async (text) => {
        const t = text||input.trim();
        if (!t||loading||(stage!==XSTAGE.PROBLEM&&stage!==XSTAGE.URGENCY_CONFIRM)) return;
        setInput("");
        const nm = [...msgs,{role:"user",content:t}];
        setMsgs(nm);
        setLoading(true);
        try {
          const r = await askAI(nm.map(m=>({role:m.role,content:m.content})), sys);
          let c = r;
          // Parse detected urgency from AI (may differ from user selection)
          let det = urgency;
          if(r.includes("URGENCY:EMERGENCY")){det="emergency";c=c.replace(/URGENCY:EMERGENCY/g,"");}
          else if(r.includes("URGENCY:HIGH")){det="high";c=c.replace(/URGENCY:HIGH/g,"");}
          else if(r.includes("URGENCY:NORMAL")){det="normal";c=c.replace(/URGENCY:NORMAL/g,"");}
          const sv=r.match(/SERVICE:([^\n|]+)/);
          if(sv){setService(sv[1].trim());c=c.replace(/SERVICE:[^\n|]+/g,"");}
          // Trigger urgency confirmation card
          if(r.includes("ASK_ZIP_CONFIRM")){
            c=c.replace(/ASK_ZIP_CONFIRM/g,"").trim();
            setDetectedUrgency(det);
            if(c) setMsgs(p=>[...p,{role:"assistant",content:c}]);
            setStage(XSTAGE.URGENCY_CONFIRM);
          } else if(r.includes("ASK_ZIP")){
            c=c.replace(/ASK_ZIP/g,"").trim();
            setMsgs(p=>[...p,{role:"assistant",content:c}]);
            setStage(STAGE.ZIP_CHECK);
          } else {
            setMsgs(p=>[...p,{role:"assistant",content:c.trim()}]);
          }
        } catch(e){setMsgs(p=>[...p,{role:"assistant",content:`Error: ${e.message||e}. Please call ${settings.phone}.`}]);}
        setLoading(false);
      };

      const steps=["Urgency","Issue","Area","Details","Schedule","Done"];
      const si={[XSTAGE.URGENCY_SELECT]:0,[XSTAGE.URGENCY_CONFIRM]:1,[XSTAGE.PROBLEM]:1,[STAGE.ZIP_CHECK]:2,[STAGE.INFO_FORM]:3,[STAGE.SLOTS]:4,[STAGE.CONFIRMED]:5};
      const cur=si[stage]||0;

      return (
        <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#0c0c16"}}>
          {/* header */}
          <div style={{padding:"11px 16px 0",background:"#10101c",borderBottom:"1px solid #222645",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:11}}>
              <div style={{display:"flex",alignItems:"center",gap:9}}>
                <div style={{width:35,height:35,borderRadius:10,background:`linear-gradient(135deg,${ac},#2563eb)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>{tmpl.emoji}</div>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:"#f0f0ff",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{settings.businessName}</div>
                  <div style={{fontSize:10,color:"#22c55e",display:"flex",alignItems:"center",gap:4}}>
                    <span style={{width:5,height:5,borderRadius:"50%",background:"#22c55e",display:"inline-block"}}/>AI Online 24/7
                  </div>
                </div>
              </div>
              {urgency&&<Badge level={urgency}/>}
            </div>
            {/* progress */}
            <div style={{display:"flex",alignItems:"center",marginBottom:11}}>
              {steps.map((s,i)=>(
                <div key={s} style={{display:"flex",alignItems:"center",flex:i<steps.length-1?1:0}}>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                    <div style={{width:19,height:19,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:i<cur?"#22c55e":i===cur?ac:"#181b35",border:`2px solid ${i<cur?"#22c55e":i===cur?ac:"#2a2d52"}`,fontSize:8,fontWeight:700,color:i<=cur?"#fff":"#52558a",transition:"all 0.3s"}}>
                      {i<cur?"✓":i+1}
                    </div>
                    <span style={{fontSize:8,color:i===cur?ac:i<cur?"#22c55e":"#353550",fontFamily:"'Inter',sans-serif",fontWeight:600,whiteSpace:"nowrap"}}>{s}</span>
                  </div>
                  {i<steps.length-1&&<div style={{flex:1,height:1.5,background:i<cur?"#22c55e40":"#181b35",margin:"0 3px",marginBottom:11,transition:"background 0.3s"}}/>}
                </div>
              ))}
            </div>
          </div>

          {/* messages */}
          <div style={{flex:1,overflowY:"auto",padding:"14px 13px",display:"flex",flexDirection:"column",gap:11}}>
            {msgs.map((m,i)=>(
              <div key={i} style={{display:"flex",gap:9,alignItems:"flex-end",flexDirection:m.role==="user"?"row-reverse":"row",animation:"fadeUp 0.25s ease"}}>
                {m.role==="assistant"&&<div style={{width:27,height:27,borderRadius:"50%",background:"linear-gradient(135deg,#38bdf8,#2563eb)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ico name="shld" size={12}/></div>}
                <div style={{maxWidth:"78%",padding:"10px 14px",fontSize:13.5,lineHeight:1.65,borderRadius:m.role==="user"?"18px 4px 18px 18px":"4px 18px 18px 18px",background:m.role==="user"?"linear-gradient(135deg,#38bdf8,#2563eb)":"#1c1c2a",color:"#f0f0f8",whiteSpace:"pre-wrap",fontFamily:"'Inter',sans-serif"}}>
                  {m.content}
                </div>
              </div>
            ))}

            {/* urgency selector — shown before any messages */}
            {stage===XSTAGE.URGENCY_SELECT&&<UrgencySelector ac={ac} onSelect={handleUrgencySelect}/>}

            {/* urgency confirm card — shown after AI detects urgency */}
            {stage===XSTAGE.URGENCY_CONFIRM&&<UrgencyConfirm detectedUrgency={detectedUrgency||urgency} ac={ac} onConfirm={handleUrgencyConfirm}/>}



            {/* confirmed */}
            {stage===STAGE.CONFIRMED&&booking&&(
              <div style={{background:"linear-gradient(135deg,#001a2d,#002040)",border:"1px solid #38bdf860",borderRadius:16,padding:15,margin:"6px 0",animation:"fadeUp 0.3s ease"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:11}}>
                  <div style={{width:24,height:24,borderRadius:"50%",background:"#22c55e",display:"flex",alignItems:"center",justifyContent:"center"}}><Ico name="ok" size={12}/></div>
                  <span style={{color:"#22c55e",fontWeight:700,fontSize:14,fontFamily:"'Inter',sans-serif"}}>Booking Confirmed!</span>
                </div>
                {[["Service",booking.service],["When",`${booking.day} · ${booking.time}`],["Name",booking.info&&booking.info.legalName],["Phone",booking.info&&booking.info.phone],["Address",booking.info?`${booking.info.street}, ${booking.info.city} ${booking.info.zip}`:null]].map(([l,v])=>v&&(
                  <div key={l} style={{display:"flex",gap:9,fontSize:12.5,fontFamily:"'Inter',sans-serif",marginBottom:5}}>
                    <span style={{color:"#505080",minWidth:70,flexShrink:0}}>{l}</span>
                    <span style={{color:"#d0d0f8",fontWeight:500}}>{v}</span>
                  </div>
                ))}
                <div style={{marginTop:10,padding:"7px 10px",background:"#001040",borderRadius:8,fontSize:11,color:"#60a5fa",display:"flex",alignItems:"center",gap:5,fontFamily:"'Inter',sans-serif"}}>
                  <Ico name="cal" size={11}/> Google Calendar updated · SMS sent
                </div>
              </div>
            )}

            {loading&&(
              <div style={{display:"flex",gap:9,alignItems:"center"}}>
                <div style={{width:27,height:27,borderRadius:"50%",background:`linear-gradient(135deg,${ac},#2563eb)`,display:"flex",alignItems:"center",justifyContent:"center"}}><Ico name="shld" size={12}/></div>
                <div style={{padding:"10px 14px",background:"#1c1c2a",borderRadius:"4px 18px 18px 18px",display:"flex",gap:5}}>
                  {[0,1,2].map(d=><span key={d} style={{width:6,height:6,borderRadius:"50%",background:ac,display:"inline-block",animation:`bounce 1.2s ${d*0.2}s infinite`}}/>)}
                </div>
              </div>
            )}
            <div ref={bot}/>
          </div>

          {/* quick replies */}
          {msgs.length<=2&&stage===XSTAGE.PROBLEM&&(
            <div style={{padding:"0 13px 8px",display:"flex",gap:6,flexWrap:"wrap",flexShrink:0}}>
              {settings.services.slice(0,4).map(sv=>(
                <button key={sv} onClick={()=>send(`I need ${sv.toLowerCase()}`)} style={{padding:"5px 11px",borderRadius:18,border:"1px solid #2a2d4a",background:"transparent",color:"#8080a8",fontSize:11.5,cursor:"pointer",fontFamily:"'Inter',sans-serif",transition:"all 0.2s"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=ac;e.currentTarget.style.color=ac;}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor="#2a2d4a";e.currentTarget.style.color="#8080a8";}}>
                  I need {sv.toLowerCase()}
                </button>
              ))}
            </div>
          )}

          {/* input bar - shown during AI conversation */}
          {(stage===XSTAGE.PROBLEM||stage===XSTAGE.URGENCY_CONFIRM)&&(
            <div style={{padding:"7px 13px 15px",flexShrink:0}}>
              <div style={{display:"flex",gap:7,background:"#1a1a28",borderRadius:26,padding:"6px 6px 6px 15px",border:"1px solid #2a2d4a"}}>
                <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Describe your issue..." style={{flex:1,background:"none",border:"none",outline:"none",color:"#e0e0f8",fontSize:13.5,fontFamily:"'Inter',sans-serif"}}/>
                <button onClick={()=>send()} disabled={loading||!input.trim()} style={{width:34,height:34,borderRadius:"50%",border:"none",cursor:"pointer",background:input.trim()?`linear-gradient(135deg,${ac},#2563eb)`:"#2a2d4a",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s"}}>
                  <Ico name="send" size={14}/>
                </button>
              </div>
            </div>
          )}

          {/* zip check - fixed at bottom */}
          {stage===STAGE.ZIP_CHECK&&(
            <div style={{padding:"8px 13px 15px",flexShrink:0}}>
              <ZipCard zips={settings.serviceZips} ac={ac} onResult={(ok,z)=>{setZip(z);if(ok){setMsgs(p=>[...p,{role:"assistant",content:`Great — ZIP ${z} is covered! I just need a few details to book your appointment.`}]);setStage(STAGE.INFO_FORM);}}}/>
            </div>
          )}

          {/* info form - fixed at bottom */}
          {stage===STAGE.INFO_FORM&&(
            <div style={{padding:"8px 13px 15px",flexShrink:0,overflowY:"auto",maxHeight:"60%"}}>
              <InfoForm zip={zip} ac={ac} bizState={settings.state} onSubmit={d=>{setInfo(d);setMsgs(p=>[...p,{role:"assistant",content:`Got it, ${d.legalName.split(" ")[0]}! Here are our open slots. ${urgency==="emergency"?"Emergency dispatch available right now.":"Pick whatever works."}`}]);setStage(STAGE.SLOTS);}}/>
            </div>
          )}

          {/* slot picker - fixed at bottom */}
          {stage===STAGE.SLOTS&&!booking&&(
            <div style={{padding:"8px 13px 15px",flexShrink:0}}>
              <SlotPick slots={slots} urgency={urgency} ac={ac} onSelect={slot=>{const b={service:service||settings.services[0],day:slot.day,time:slot.emergency?"ASAP (30-60 min)":slot.time,urgency,info,at:new Date().toISOString(),slotId:slot.id};setBooking(b);onBooked(b);setMsgs(p=>[...p,{role:"assistant",content:`You're all set, ${info&&info.legalName.split(" ")[0]}! 🎉 Confirmed for ${slot.day}${slot.emergency?" — emergency dispatch":" at "+slot.time}. SMS sent to ${info&&info.phone}.`}]);setStage(STAGE.CONFIRMED);}}/>
            </div>
          )}
        </div>
      );
    }

    function ZipCard({zips, ac, onResult}) {
      const [zip,setZip]=useState(""), [st,setSt]=useState(null), ref=useRef(null);
      useEffect(()=>{if(ref.current)ref.current.focus();},[]);
      const check=()=>{if(zip.length!==5)return;setSt("checking");setTimeout(()=>{const ok=zips.includes(zip);setSt(ok?"ok":"no");if(ok)setTimeout(()=>onResult(true,zip),700);},600);};
      return (
        <div style={{background:"#13131e",border:"1px solid #2a2d4a",borderRadius:16,overflow:"hidden",margin:"6px 0",animation:"fadeUp 0.3s ease"}}>
          <div style={{padding:"11px 15px",borderBottom:"1px solid #2a2d4a",display:"flex",alignItems:"center",gap:7}}>
            <span>📍</span><span style={{fontSize:11,fontWeight:700,color:"#a0a0c0",letterSpacing:"0.05em",textTransform:"uppercase",fontFamily:"'Inter',sans-serif"}}>Service Area Check</span>
          </div>
          <div style={{padding:14}}>
            <p style={{fontSize:13,color:"#8080a8",marginBottom:11,lineHeight:1.6,fontFamily:"'Inter',sans-serif"}}>Enter your ZIP code to confirm we can reach you.</p>
            <div style={{display:"flex",gap:8}}>
              <input ref={ref} value={zip} onChange={e=>{setZip(e.target.value.replace(/\D/g,"").slice(0,5));setSt(null);}} onKeyDown={e=>e.key==="Enter"&&zip.length===5&&check()} placeholder="e.g. 80203" maxLength={5}
                style={{flex:1,padding:"9px 14px",background:"#181b35",border:`1px solid ${st==="ok"?"#22c55e":st==="no"?"#ef4444":"#2a2d52"}`,borderRadius:10,color:"#e0e0f8",fontSize:16,letterSpacing:"0.15em",outline:"none",fontFamily:"'Inter',sans-serif",textAlign:"center",transition:"border-color 0.2s"}}/>
              <button onClick={check} disabled={zip.length!==5} style={{padding:"9px 16px",borderRadius:10,border:"none",cursor:zip.length===5?"pointer":"not-allowed",background:zip.length===5?"linear-gradient(135deg,#38bdf8,#2563eb)":"#181b35",color:"#fff",fontSize:13,fontWeight:700,opacity:zip.length===5?1:0.4,fontFamily:"'Inter',sans-serif"}}>
                {st==="checking"?"...":"Check"}
              </button>
            </div>
            {st==="ok"&&<div style={{marginTop:9,padding:"9px 12px",background:"#001a0a",border:"1px solid #22c55e40",borderRadius:10,fontSize:12,color:"#22c55e",animation:"fadeUp 0.2s ease",fontFamily:"'Inter',sans-serif"}}>✅ ZIP {zip} is in our service area!</div>}
            {st==="no"&&<div style={{marginTop:9,padding:"9px 12px",background:"#1c0000",border:"1px solid #ef444440",borderRadius:10,fontSize:12,color:"#ef4444",fontFamily:"'Inter',sans-serif"}}>❌ ZIP {zip} is outside our service area. Call us for referrals.</div>}
          </div>
        </div>
      );
    }

    function InfoForm({zip, ac, bizState, onSubmit}) {
      const [f,setF]=useState({legalName:"",phone:"",street:"",city:"",state:bizState||"",zip});;
      const [err,setErr]=useState({});
      const [sub,setSub]=useState(false);
      const set=(k,v)=>setF(p=>({...p,[k]:v}));
      const go=()=>{
        const e={};
        if(f.legalName.trim().split(" ").length<2)e.legalName="Full legal name required";
        if(!/^\+1 \(\d{3}\) \d{3}-\d{4}$/.test(f.phone))e.phone="Format: +1 (000) 000-0000";
        if(!f.street.trim())e.street="Required";
        if(!f.city.trim())e.city="Required";
        if(Object.keys(e).length){setErr(e);return;}
        setSub(true);setTimeout(()=>onSubmit(f),400);
      };
      const is=(k)=>({padding:"9px 11px",background:"#181b35",border:`1px solid ${err[k]?"#ef4444":"#2a2d52"}`,borderRadius:10,color:"#e0e0f8",fontSize:13,outline:"none",fontFamily:"'Inter',sans-serif",width:"100%"});
      const Lb=({c})=><label style={{fontSize:10,fontWeight:700,color:"#757aa8",letterSpacing:"0.06em",textTransform:"uppercase",display:"block",marginBottom:4,fontFamily:"'Inter',sans-serif"}}>{c}</label>;

      return (
        <div style={{background:"#13131e",border:"1px solid #2a2d4a",borderRadius:16,overflow:"hidden",margin:"6px 0",animation:"fadeUp 0.3s ease"}}>
          <div style={{padding:"11px 15px",borderBottom:"1px solid #2a2d4a",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:7}}><span>👤</span><span style={{fontSize:11,fontWeight:700,color:"#a0a0c0",letterSpacing:"0.05em",textTransform:"uppercase",fontFamily:"'Inter',sans-serif"}}>Your Information</span></div>
            <span style={{fontSize:10,padding:"2px 8px",background:"#001428",color:"#60a5fa",borderRadius:10,border:"1px solid #60a5fa40",fontFamily:"'Inter',sans-serif"}}>🔒 Secure</span>
          </div>
          <div style={{padding:14,display:"flex",flexDirection:"column",gap:9}}>
            <div><Lb c="Legal Full Name"/><input value={f.legalName} onChange={e=>{set("legalName",e.target.value);setErr(v=>({...v,legalName:null}));}} placeholder="John Smith" style={is("legalName")}/>{err.legalName&&<span style={{fontSize:11,color:"#ef4444",fontFamily:"'Inter',sans-serif"}}>{err.legalName}</span>}</div>
            <div><Lb c="Phone Number"/><input value={f.phone} onChange={e=>{set("phone",formatPhone(e.target.value));setErr(v=>({...v,phone:null}));}} placeholder="+1 (720) 555-0100" type="tel" style={is("phone")}/>{err.phone&&<span style={{fontSize:11,color:"#ef4444",fontFamily:"'Inter',sans-serif"}}>{err.phone}</span>}</div>
            <div><Lb c="Street Address"/><input value={f.street} onChange={e=>{set("street",e.target.value);setErr(v=>({...v,street:null}));}} placeholder="123 Main St" style={is("street")}/>{err.street&&<span style={{fontSize:11,color:"#ef4444",fontFamily:"'Inter',sans-serif"}}>{err.street}</span>}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 46px 76px",gap:7}}>
              <div><Lb c="City"/><input value={f.city} onChange={e=>{set("city",e.target.value);setErr(v=>({...v,city:null}));}} placeholder="Denver" style={is("city")}/></div>
              <div><Lb c="State"/><input value={f.state} onChange={e=>set("state", formatState(e.target.value))} maxLength={2} placeholder="NY" style={is("state")}/></div>
              <div><Lb c="ZIP"/><input value={f.zip} onChange={e=>set("zip",e.target.value.replace(/\D/g,"").slice(0,5))} style={is("zip")}/></div>
            </div>
            <div style={{padding:"8px 11px",background:"#0b0d1e",borderRadius:9,border:"1px solid #262950",fontSize:11,color:"#6b6f9a",fontFamily:"'Inter',sans-serif"}}>🔒 Only shared with the assigned technician.</div>
            <button onClick={go} disabled={sub} style={{padding:12,borderRadius:12,border:"none",cursor:"pointer",background:sub?"#181b35":`linear-gradient(135deg,${ac},#2563eb)`,color:"#fff",fontSize:14,fontWeight:700,fontFamily:"'Plus Jakarta Sans',sans-serif",transition:"all 0.2s"}}>
              {sub?"Saving...":"Continue to Scheduling →"}
            </button>
          </div>
        </div>
      );
    }

    function SlotPick({slots, urgency, ac, onSelect}) {
      const days=[...new Set(slots.map(s=>s.day))];
      const [day,setDay]=useState(days[0]);
      const ds=slots.filter(s=>s.day===day&&!s.booked);
      return (
        <div style={{background:"#13131e",border:"1px solid #2a2d4a",borderRadius:16,overflow:"hidden",margin:"6px 0",animation:"fadeUp 0.3s ease"}}>
          <div style={{padding:"11px 15px",borderBottom:"1px solid #2a2d4a",display:"flex",alignItems:"center",gap:7}}>
            <Ico name="cal" size={14}/><span style={{fontSize:11,fontWeight:700,color:"#a0a0c0",letterSpacing:"0.05em",textTransform:"uppercase",fontFamily:"'Inter',sans-serif"}}>Available Times</span>
          </div>
          {urgency==="emergency"&&(
            <div style={{padding:"9px 13px",borderBottom:"1px solid #2a2d4a"}}>
              <button onClick={()=>onSelect({id:"emg",day:"Today",time:"ASAP",emergency:true})} style={{width:"100%",padding:"10px 14px",background:"#3d0000",border:"1px solid #ff4444",borderRadius:11,color:"#ff6666",cursor:"pointer",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"space-between",fontFamily:"'Inter',sans-serif"}}>
                <span>🚨 Dispatch Emergency Tech Now</span><span style={{fontSize:11,opacity:0.8}}>30-60 min</span>
              </button>
            </div>
          )}
          <div style={{display:"flex",borderBottom:"1px solid #2a2d4a",overflowX:"auto"}}>
            {days.map(d=><button key={d} onClick={()=>setDay(d)} style={{padding:"8px 12px",border:"none",background:"transparent",cursor:"pointer",color:day===d?ac:"#757aa8",fontSize:11,fontWeight:600,borderBottom:day===d?`2px solid ${ac}`:"2px solid transparent",whiteSpace:"nowrap",fontFamily:"'Inter',sans-serif",transition:"color 0.2s"}}>{d}</button>)}
          </div>

      if (digits.length <= 3) return `+1 (${digits}`;
      if (digits.length <= 6) return `+1 (${digits.slice(0,3)}) ${digits.slice(3)}`;

    function DashWithCTA({bookings, settings, lang, onTryChat, newBookingId, onUpdateBooking}) {
      const t = T[lang]||T.en;
      const tmpl=TEMPLATES[settings.businessType]||{emoji:settings.customEmoji||"🏢",label:settings.customLabel||settings.businessType,color:settings.customColor||"#38bdf8"}, ac=tmpl.color;
      const now = new Date();
      const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      const days7 = Array.from({length:7},(_,i)=>{
        const d=new Date(now); d.setDate(now.getDate()+i);
        return {
          key: i===0?"Today":i===1?"Tomorrow":`${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`,
          label: `${["Su","Mo","Tu","We","Th","Fr","Sa"][d.getDay()]}\n${d.getDate()}`,
          sub: i===0?"Today":i===1?"Tmrw":null,
        };
      });
      const active = bookings.filter(b=>b.status!=="completed"&&b.status!=="cancelled");
      const todayBookings = active.filter(b=>b.day==="Today");
      const countByDay={};
      days7.forEach(({key})=>{ countByDay[key]=active.filter(b=>b.day===key).length; });

      // Today section: which urgency group is open
      const [todayOpen, setTodayOpen] = useState(null); // "emergency"|"high"|"normal"|null
      // Calendar
      const [calDay, setCalDay] = useState(null);
      // Pending section
      const [pendingOpen, setPendingOpen] = useState(false);
      const [pendingGroup, setPendingGroup] = useState(null);
      const [archiveTab, setArchiveTab] = useState(null); // null|"completed"|"cancelled"
      const [archiveGroup, setArchiveGroup] = useState(null);

      // Sort by time for pending list
      const timeToMin = (b) => {
        if (!b.time) return 9999;
        const m = b.time.match(/(\d+):(\d+)\s*(AM|PM)/i);
        if (!m) return 9999;
        let h=parseInt(m[1]), mn=parseInt(m[2]), ap=m[3].toUpperCase();
        if(ap==="PM"&&h!==12) h+=12;
        if(ap==="AM"&&h===12) h=0;
        return h*60+mn;
      };
      const sortedActive = [...active].sort((a,b)=>{
        const dayOrdA = days7.findIndex(d=>d.key===a.day); 
        const dayOrdB = days7.findIndex(d=>d.key===b.day);
        const dA = dayOrdA===-1?99:dayOrdA, dB = dayOrdB===-1?99:dayOrdB;
        if(dA!==dB) return dA-dB;
        return timeToMin(a)-timeToMin(b);
      });

      const TodayUrgencySection = ({urgency, label, col}) => {
        const items = todayBookings.filter(b=>b.urgency===urgency);
        const isOpen = todayOpen===urgency;
        return (
          <div style={{borderRadius:10,overflow:"hidden",border:`1px solid ${col}30`,marginBottom:6}}>
            <button onClick={()=>setTodayOpen(isOpen?null:urgency)}
              style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 12px",background:isOpen?`${col}15`:"transparent",border:"none",cursor:"pointer",transition:"all 0.15s"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:12,fontWeight:700,color:col,fontFamily:"'Inter',sans-serif"}}>{label}</span>
                <span style={{fontSize:13,fontWeight:800,color:col,fontFamily:"'Plus Jakarta Sans',sans-serif",background:`${col}20`,padding:"1px 8px",borderRadius:10}}>{items.length}</span>
              </div>
              <span style={{fontSize:10,color:col,opacity:0.7}}>{isOpen?"▲":"▼"}</span>
            </button>
            {isOpen&&(
              <div style={{padding:"8px 10px",display:"flex",flexDirection:"column",gap:7,background:`${col}08`}}>
                {items.length===0
                  ?<div style={{fontSize:12,color:"#52558a",fontFamily:"'Inter',sans-serif",padding:"6px 2px"}}>No appointments</div>
                  :items.map((b,i)=><BookingCard key={b.id||i} b={b} ac={ac} lang={lang} onUpdateBooking={onUpdateBooking} isNew={b.id===newBookingId}/>)
                }
              </div>
            )}
          </div>
        );
      };

      return (
        <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#070818",overflowY:"auto"}}>
          {/* ── Sticky header ── */}
          <div style={{padding:"14px 18px 12px",background:"#0b0d1e",borderBottom:"1px solid #222645",flexShrink:0,display:"flex",alignItems:"center",gap:9}}>
            <span style={{fontSize:20}}>{tmpl.emoji}</span>
            <div style={{flex:1}}>
              <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:17,fontWeight:800,color:"#f0f0ff"}}>{settings.businessName}</div>
              <div style={{fontSize:11,color:"#6b6f9a",marginTop:2,fontFamily:"'Inter',sans-serif"}}>{t.aiLive} · {settings.serviceZips.length} {t.zips} · {settings.services.length} {t.services}</div>
            </div>
          </div>

          <div style={{padding:"14px 18px",display:"flex",flexDirection:"column",gap:10}}>

            {/* ── CTA (no bookings yet) ── */}
            {bookings.length===0&&(
              <div style={{background:"linear-gradient(135deg,rgba(56,189,248,0.08),rgba(129,140,248,0.08))",border:`1px solid ${ac}40`,borderRadius:14,padding:"18px 16px",textAlign:"center",animation:"fadeUp 0.4s ease"}}>
                <div style={{fontSize:28,marginBottom:8}}>🤖</div>
                <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:15,fontWeight:800,color:"#e0e0ff",marginBottom:6}}>Your AI agent is live!</div>
                <div style={{fontSize:13,color:"#757aa8",fontFamily:"'Inter',sans-serif",marginBottom:14,lineHeight:1.6}}>
                  See it in action — try booking an appointment as a customer would.
                </div>
                <button onClick={onTryChat} style={{padding:"11px 28px",borderRadius:10,border:"none",cursor:"pointer",background:`linear-gradient(135deg,${ac},#818cf8)`,color:"#fff",fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:13,fontWeight:800,boxShadow:`0 0 20px ${ac}40`,transition:"all 0.2s"}}
                  onMouseEnter={e=>e.currentTarget.style.opacity="0.85"}
                  onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
                  💬 Talk to your AI agent →
                </button>
              </div>
            )}

            {/* ── TODAY section ── */}
            {bookings.length>0&&(
              <div style={{background:"#0c0e24",border:"1px solid #262950",borderRadius:12,padding:"12px 14px"}}>
                <div style={{fontSize:13,fontWeight:700,color:"#d0d0f0",fontFamily:"'Plus Jakarta Sans',sans-serif",marginBottom:10}}>
                  📅 {now.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}
                </div>
                {todayBookings.length===0
                  ?<div style={{fontSize:12,color:"#52558a",fontFamily:"'Inter',sans-serif"}}>No appointments today</div>
                  :<div>
                    <TodayUrgencySection urgency="emergency" label="🚨 Emergency" col="#ff4444"/>
                    <TodayUrgencySection urgency="high"      label="⚡ Urgent"    col="#f97316"/>
                    <TodayUrgencySection urgency="normal"    label="📅 Regular"   col="#60a5fa"/>
                  </div>
                }
              </div>
            )}

            {/* ── 7-DAY CALENDAR ── */}
            {bookings.length>0&&(
              <div style={{background:"#0c0e24",border:"1px solid #262950",borderRadius:12,padding:"12px 14px"}}>
                <div style={{fontSize:10,fontWeight:700,color:"#52558a",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10,fontFamily:"'Inter',sans-serif"}}>7-Day Booking Calendar</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5,marginBottom:calDay?12:0}}>
                  {days7.map(({key,label,sub})=>{
                    const cnt=countByDay[key]||0, isToday=key==="Today", isSel=calDay===key;
                    return (
                      <div key={key} onClick={()=>setCalDay(isSel?null:key)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"8px 4px",borderRadius:10,cursor:"pointer",background:isSel?`${ac}30`:isToday?`${ac}15`:"transparent",border:isSel?`1px solid ${ac}`:isToday?`1px solid ${ac}40`:"1px solid transparent",transition:"all 0.15s"}}
                        onMouseEnter={e=>{if(!isSel)e.currentTarget.style.background=`${ac}10`;}}
                        onMouseLeave={e=>{if(!isSel)e.currentTarget.style.background=isToday?`${ac}15`:"transparent";}}>
                        <div style={{fontSize:9,fontWeight:700,color:isSel||isToday?ac:"#6b6f9a",fontFamily:"'Inter',sans-serif",textAlign:"center",whiteSpace:"pre-line",lineHeight:1.3}}>{label}</div>
                        <div style={{width:24,height:24,borderRadius:"50%",background:cnt>0?(isSel?ac:`${ac}80`):"#1a1a28",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}}>
                          <span style={{fontSize:11,fontWeight:800,color:cnt>0?"#fff":"#303050",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{cnt||""}</span>
                        </div>
                        {sub&&<div style={{fontSize:8,fontWeight:700,color:isToday?ac:"#f97316",fontFamily:"'Inter',sans-serif",letterSpacing:"0.04em"}}>{sub}</div>}
                      </div>
                    );
                  })}
                </div>
                {calDay&&(()=>{
                  const dayBookings=[...active.filter(b=>b.day===calDay)].sort((a,b)=>timeToMin(a)-timeToMin(b));
                  return (
                    <div style={{borderTop:"1px solid #222645",paddingTop:10}}>
                      <div style={{fontSize:10,fontWeight:700,color:ac,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8,fontFamily:"'Inter',sans-serif"}}>{calDay}</div>
                      {dayBookings.length===0
                        ?<div style={{fontSize:12,color:"#52558a",fontFamily:"'Inter',sans-serif",padding:"8px 0"}}>No appointments</div>
                        :dayBookings.map((b,i)=><BookingCard key={b.id||i} b={b} ac={ac} lang={lang} onUpdateBooking={onUpdateBooking}/>)
                      }
                    </div>
                  );
                })()}
              </div>
            )}

            {/* ── PENDING / COMPLETED / CANCELLED row ── */}
            {bookings.length>0&&(()=>{
              const completed = [...bookings.filter(b=>b.status==="completed")].sort((a,b)=>timeToMin(a)-timeToMin(b));
              const cancelled = [...bookings.filter(b=>b.status==="cancelled")].sort((a,b)=>timeToMin(a)-timeToMin(b));

              const ArchiveSection = ({tab, label, col, items}) => {
                const isTabOpen = archiveTab===tab;
                return (
                  <div style={{background:"#0c0e24",border:`1px solid ${col}30`,borderRadius:12,overflow:"hidden"}}>
                    <button onClick={()=>{setArchiveTab(isTabOpen?null:tab); setArchiveGroup(null);}}
                      style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",background:"transparent",border:"none",cursor:"pointer"}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <span style={{fontSize:13,fontWeight:700,color:col,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{label}</span>
                        <span style={{fontSize:14,fontWeight:800,color:col,fontFamily:"'Plus Jakarta Sans',sans-serif",background:`${col}20`,padding:"1px 10px",borderRadius:12}}>{items.length}</span>
                      </div>
                      <span style={{fontSize:11,color:col,opacity:0.6}}>{isTabOpen?"▲":"▼"}</span>
                    </button>
                    {isTabOpen&&(
                      <div style={{borderTop:`1px solid ${col}20`,padding:"10px 14px",display:"flex",flexDirection:"column",gap:6}}>
                        {items.length===0
                          ?<div style={{fontSize:12,color:"#52558a",fontFamily:"'Inter',sans-serif",padding:"6px 2px"}}>None</div>
                          :[
                            {key:"emergency",label:"🚨 Emergency",col:"#ff4444"},
                            {key:"high",     label:"⚡ Urgent",   col:"#f97316"},
                            {key:"normal",   label:"📅 Regular",  col:"#60a5fa"},
                          ].map(({key,label:gl,col:gc})=>{
                            const grp=items.filter(b=>b.urgency===key);
                            const isOpen=archiveGroup===`${tab}-${key}`;
                            return (
                              <div key={key} style={{borderRadius:10,overflow:"hidden",border:`1px solid ${gc}30`}}>
                                <button onClick={()=>setArchiveGroup(isOpen?null:`${tab}-${key}`)}
                                  style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 12px",background:isOpen?`${gc}15`:"transparent",border:"none",cursor:"pointer"}}>
                                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                                    <span style={{fontSize:12,fontWeight:700,color:gc,fontFamily:"'Inter',sans-serif"}}>{gl}</span>
                                    <span style={{fontSize:12,fontWeight:800,color:gc,background:`${gc}20`,padding:"1px 8px",borderRadius:10,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{grp.length}</span>
                                  </div>
                                  <span style={{fontSize:10,color:gc,opacity:0.7}}>{isOpen?"▲":"▼"}</span>
                                </button>
                                {isOpen&&(
                                  <div style={{padding:"8px 10px",display:"flex",flexDirection:"column",gap:7,background:`${gc}08`}}>
                                    {grp.length===0
                                      ?<div style={{fontSize:12,color:"#52558a",fontFamily:"'Inter',sans-serif",padding:"6px 2px"}}>None</div>
                                      :grp.map((b,i)=><BookingCard key={b.id||i} b={b} ac={ac} lang={lang} onUpdateBooking={onUpdateBooking} showRestore={true}/>)
                                    }
                                  </div>
                                )}
                              </div>
                            );
                          })
                        }
                      </div>
                    )}
                  </div>
                );
              };

              return (
                <>
                  {/* Pending */}
                  <div style={{background:"#0c0e24",border:"1px solid #262950",borderRadius:12,overflow:"hidden"}}>
                    <button onClick={()=>{setPendingOpen(o=>!o); setPendingGroup(null);}}
                      style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 14px",background:"transparent",border:"none",cursor:"pointer"}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <span style={{fontSize:13,fontWeight:700,color:"#d0d0f0",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Pending</span>
                        <span style={{fontSize:16,fontWeight:800,color:"#60a5fa",fontFamily:"'Plus Jakarta Sans',sans-serif",background:"#60a5fa20",padding:"1px 10px",borderRadius:12}}>{active.length}</span>
                      </div>
                      <span style={{fontSize:11,color:"#6b6f9a"}}>{pendingOpen?"▲":"▼"}</span>
                    </button>
                    {pendingOpen&&(
                      <div style={{borderTop:"1px solid #222645",padding:"10px 14px",display:"flex",flexDirection:"column",gap:6}}>
                        {[
                          {key:"emergency",label:"🚨 Emergency",col:"#ff4444"},
                          {key:"high",     label:"⚡ Urgent",   col:"#f97316"},
                          {key:"normal",   label:"📅 Regular",  col:"#60a5fa"},
                        ].map(({key,label,col})=>{
                          const grp=sortedActive.filter(b=>b.urgency===key);
                          const isOpen=pendingGroup===key;
                          return (
                            <div key={key} style={{borderRadius:10,overflow:"hidden",border:`1px solid ${col}30`}}>
                              <button onClick={()=>setPendingGroup(isOpen?null:key)}
                                style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 12px",background:isOpen?`${col}15`:"transparent",border:"none",cursor:"pointer",transition:"all 0.15s"}}>
                                <div style={{display:"flex",alignItems:"center",gap:8}}>
                                  <span style={{fontSize:12,fontWeight:700,color:col,fontFamily:"'Inter',sans-serif"}}>{label}</span>
                                  <span style={{fontSize:13,fontWeight:800,color:col,fontFamily:"'Plus Jakarta Sans',sans-serif",background:`${col}20`,padding:"1px 8px",borderRadius:10}}>{grp.length}</span>
                                </div>
                                <span style={{fontSize:10,color:col,opacity:0.7}}>{isOpen?"▲":"▼"}</span>
                              </button>
                              {isOpen&&(
                                <div style={{padding:"8px 10px",display:"flex",flexDirection:"column",gap:7,background:`${col}08`}}>
                                  {grp.length===0
                                    ?<div style={{fontSize:12,color:"#52558a",fontFamily:"'Inter',sans-serif",padding:"6px 2px"}}>None</div>
                                    :grp.map((b,i)=><BookingCard key={b.id||i} b={b} ac={ac} lang={lang} onUpdateBooking={onUpdateBooking} isNew={b.id===newBookingId}/>)
                                  }
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>

                  {/* Completed */}
                  <ArchiveSection tab="completed" label="✓ Completed" col="#22c55e" items={completed}/>

                  {/* Cancelled */}
                  <ArchiveSection tab="cancelled" label="✕ Cancelled" col="#ff4444" items={cancelled}/>
                </>
              );
            })()}

            {/* Book another */}
            {bookings.length>0&&(
              <button onClick={onTryChat} style={{padding:"10px",borderRadius:10,border:`1px solid ${ac}30`,background:"transparent",cursor:"pointer",color:ac,fontFamily:"'Inter',sans-serif",fontSize:12,fontWeight:600,transition:"all 0.2s"}}
                onMouseEnter={e=>e.currentTarget.style.background=ac+"10"}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                + Book another appointment
              </button>
            )}
          </div>
        </div>
      );
    }

    // ── MAIN APP ──
    function App() {
      // Demo flow: "intro" → "setup" → "main"
      const [screen, setScreen] = useState("intro");

      const [settings, setSettings] = useState(defaultSettings("plumber"));
      const [bookings, setBookings] = useState([]);
      const [chatKey, setChatKey] = useState(0);
      const [showChat, setShowChat] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [lang, setLang] = useState("en");
      const [newBookingId, setNewBookingId] = useState(null);
      const isDesktop = useIsDesktop();
      const t = T[lang]||T.en;
      const ac = (TEMPLATES[settings.businessType]||{color:settings.customColor||'#38bdf8'}).color;

      const handleLaunch = (s) => { setSettings(s); setScreen("main"); setShowChat(false); };

      const [bookedSlotIds, setBookedSlotIds] = useState([]);

      const handleBooked = (b) => {
        const id = Date.now().toString();
        b.id = id;
        setBookings(p=>[b,...p]);
        if (b.slotId) setBookedSlotIds(p=>[...p, b.slotId]);
        setNewBookingId(id);
        setShowChat(false);
        setTimeout(()=>setNewBookingId(null), 5000);
      };

      const handleUpdateBooking = (id, status) => {
        setBookings(p => p.map(b => b.id===id ? {...b, status: status==="pending" ? undefined : status} : b));
      };

      const handleTryChat = () => { setChatKey(k=>k+1); setShowChat(true); };

      // Show key entry if not set

      if (screen==="intro") return <IntroScreen onStart={()=>setScreen("setup")}/>;
      if (screen==="setup") return <SetupScreen onLaunch={handleLaunch}/>;

      // ── MAIN SCREEN (desktop) ──
      if (isDesktop) {
        return (
          <div style={{display:"flex",flexDirection:"column",height:"100dvh",background:"#080810"}}>
            {/* top bar */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#070710",borderBottom:"1px solid #141420",padding:"7px 20px",flexShrink:0}}>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:17,fontWeight:800,color:"#fff",letterSpacing:"-0.01em"}}>Annie<span style={{color:ac}}> the Agent</span></div>
                <div style={{width:1,height:16,background:"#222645"}}/>
                <button onClick={()=>setScreen("setup")} style={{fontSize:11,color:"#6b6f9a",fontFamily:"'Inter',sans-serif",background:"none",border:"none",cursor:"pointer",padding:0}}
                  onMouseEnter={e=>e.currentTarget.style.color="#a0a0c0"}
                  onMouseLeave={e=>e.currentTarget.style.color="#6b6f9a"}>
                  ← Change business type
                </button>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <LangToggle lang={lang} setLang={setLang} ac={ac}/>
                <button onClick={()=>setShowSettings(s=>!s)} style={{padding:"5px 14px",borderRadius:10,border:`1px solid ${showSettings?ac+"80":"#2a2d4a"}`,background:showSettings?`${ac}18`:"transparent",color:showSettings?ac:"#757aa8",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'Inter',sans-serif",display:"flex",alignItems:"center",gap:5,transition:"all 0.2s"}}>
                  <Ico name={showSettings?"grid":"cog"} size={13}/>
                  {showSettings ? t.backDash : t.openSettings}
                </button>
              </div>
            </div>

            {/* main area */}
            <div style={{flex:1,display:"flex",overflow:"hidden"}}>
              {/* LEFT: dashboard or settings */}
              <div style={{flex:1,overflow:"hidden",borderRight:showChat?"1px solid #1a1a28":"none"}}>
                {showSettings
                  ? <Settings settings={settings} onSave={(ns)=>{setSettings(ns);setShowSettings(false);}} lang={lang}/>
                  : <DashWithCTA bookings={bookings} settings={settings} lang={lang} onTryChat={handleTryChat} newBookingId={newBookingId} onUpdateBooking={handleUpdateBooking}/>
                }
              </div>

              {/* RIGHT: chat panel — slides in when active */}
              {showChat&&(
                <div style={{width:"44%",display:"flex",flexDirection:"column",overflow:"hidden",animation:"slideIn 0.35s ease"}}>
                  <div style={{padding:"10px 16px",background:"#0b0d1e",borderBottom:"1px solid #222645",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <span style={{fontSize:10,fontWeight:700,color:"#6b6f9a",letterSpacing:"0.08em",textTransform:"uppercase",fontFamily:"'Inter',sans-serif"}}>💬 Customer View</span>
                    <button onClick={()=>setShowChat(false)} style={{background:"none",border:"none",color:"#6b6f9a",cursor:"pointer",fontSize:11,fontFamily:"'Inter',sans-serif",display:"flex",alignItems:"center",gap:4}}
                      onMouseEnter={e=>e.currentTarget.style.color="#a0a0c0"}
                      onMouseLeave={e=>e.currentTarget.style.color="#6b6f9a"}>
                      ← Back to dashboard
                    </button>
                  </div>
                  <div style={{flex:1,overflow:"hidden"}}>
                    <Chat key={chatKey} settings={settings} bookedSlotIds={bookedSlotIds} onBooked={handleBooked}/>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      // ── MOBILE MAIN ──
      const mobileView = showChat ? "chat" : showSettings ? "settings" : "dashboard";
      return (
        <div style={{maxWidth:430,margin:"0 auto",height:"100dvh",display:"flex",flexDirection:"column"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#070710",borderBottom:"1px solid #141420",padding:"9px 14px",flexShrink:0}}>
            <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:16,fontWeight:800,color:"#fff"}}>Annie<span style={{color:ac}}> the Agent</span></div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <LangToggle lang={lang} setLang={setLang} ac={ac}/>
              <button onClick={()=>setScreen("setup")} style={{fontSize:10,color:"#6b6f9a",fontFamily:"'Inter',sans-serif",background:"none",border:"1px solid #2a2d4a",borderRadius:8,cursor:"pointer",padding:"4px 8px"}}>← Setup</button>
            </div>
          </div>
          {/* nav tabs */}
          <div style={{display:"flex",background:"#0b0d1e",borderBottom:"1px solid #222645",flexShrink:0}}>
            {[{k:"dashboard",l:t.navDashboard,i:"grid"},{k:"settings",l:t.navSettings,i:"cog"}].map(tab=>{
              const active=mobileView===tab.k;
              return (
                <button key={tab.k} onClick={()=>{setShowChat(false);setShowSettings(tab.k==="settings");}}
                  style={{flex:1,padding:"10px 4px",border:"none",background:"transparent",cursor:"pointer",color:active?ac:"#6b6f9a",fontSize:10,fontWeight:600,borderBottom:active?`2px solid ${ac}`:"2px solid transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:3,fontFamily:"'Inter',sans-serif",letterSpacing:"0.05em",textTransform:"uppercase",transition:"color 0.2s"}}>
                  <Ico name={tab.i} size={15}/>{tab.l}
                  {tab.k==="dashboard"&&bookings.length>0&&!showChat&&<span style={{position:"absolute",marginTop:-8,marginLeft:16,width:14,height:14,background:ac,borderRadius:"50%",fontSize:8,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700}}>{bookings.length}</span>}
                </button>
              );
            })}
          </div>
          <div style={{flex:1,overflow:"hidden"}}>
            {mobileView==="chat"&&<Chat key={chatKey} settings={settings} bookedSlotIds={bookedSlotIds} onBooked={handleBooked}/>}
            {mobileView==="settings"&&<Settings settings={settings} onSave={(ns)=>{setSettings(ns);setShowSettings(false);}} lang={lang}/>}
            {mobileView==="dashboard"&&<DashWithCTA bookings={bookings} settings={settings} lang={lang} onTryChat={handleTryChat} newBookingId={newBookingId} onUpdateBooking={handleUpdateBooking}/>}
          </div>
        </div>
      );
    }

    try {
      ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
    } catch(e) {
      document.getElementById("root").innerHTML = '<div style="color:#ff4444;padding:40px;font-family:monospace;background:#0a0010;min-height:100vh;"><h2>JS Error:</h2><pre>' + e.message + '</pre><pre>' + (e.stack||'') + '</pre></div>';
    }
  </script>
</body>
</html>
